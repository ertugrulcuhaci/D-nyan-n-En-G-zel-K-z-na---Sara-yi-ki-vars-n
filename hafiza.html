<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anı Eşleştirme 🧩</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Poppins', sans-serif; background: #ffe6ea;
        display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0;
    }
    h2 { color: #d81b60; margin-bottom: 10px; }
    .grid {
        display: grid; grid-template-columns: repeat(4, 80px); gap: 10px; margin-bottom: 20px;
    }
    @media (min-width: 500px) { .grid { grid-template-columns: repeat(4, 100px); gap: 15px; } }
    
    .card {
        width: 100%; aspect-ratio: 1; background: #ffb6c1; border-radius: 10px;
        cursor: pointer; position: relative; transform-style: preserve-3d;
        transition: transform 0.5s; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .card.flip { transform: rotateY(180deg); cursor: default; }
    
    .front, .back {
        position: absolute; width: 100%; height: 100%; border-radius: 10px;
        backface-visibility: hidden; display: flex; align-items: center; justify-content: center;
    }
    .front { background: #ff4b2b; color: white; font-size: 30px; }
    .back {
        background: white; transform: rotateY(180deg);
        background-size: cover; background-position: center;
    }
    
    .btn {
        padding: 10px 20px; background: #d81b60; color: white; border: none; border-radius: 20px;
        cursor: pointer; font-family: 'Poppins', sans-serif; text-decoration: none;
    }
</style>
</head>
<body>

    <h2>Anılarımızı Eşleştir 💖</h2>
    <div class="grid" id="grid"></div>
    <a href="oyun.html" class="btn">Menüye Dön</a>

<script>
    const grid = document.getElementById('grid');
    let cards = [];
    let firstCard, secondCard;
    let lockBoard = false;
    let matches = 0;

    // 6 fotoğrafı 2'şer kez ekliyoruz
    const images = ['hafiza1.jpg', 'hafiza2.jpg', 'hafiza3.jpg', 'hafiza4.jpg', 'hafiza5.jpg', 'hafiza6.jpg'];
    const deck = [...images, ...images].sort(() => 0.5 - Math.random());

    deck.forEach(img => {
        const card = document.createElement('div');
        card.classList.add('card');
        card.dataset.img = img;
        
        card.innerHTML = `
            <div class="front">❤️</div>
            <div class="back" style="background-image: url('${img}')"></div>
        `;
        
        card.addEventListener('click', flipCard);
        grid.appendChild(card);
    });

    function flipCard() {
        if (lockBoard || this === firstCard) return;
        this.classList.add('flip');

        if (!firstCard) {
            firstCard = this;
            return;
        }

        secondCard = this;
        checkForMatch();
    }

    function checkForMatch() {
        if (firstCard.dataset.img === secondCard.dataset.img) {
            disableCards();
            matches++;
            if(matches === 6) {
                setTimeout(() => alert("Tüm anılarımız eşleşti! Tıpkı kalplerimiz gibi... Seni çok seviyorum Sara! ❤️"), 500);
            }
        } else {
            unflipCards();
        }
    }

    function disableCards() {
        firstCard.removeEventListener('click', flipCard);
        secondCard.removeEventListener('click', flipCard);
        resetBoard();
    }

    function unflipCards() {
        lockBoard = true;
        setTimeout(() => {
            firstCard.classList.remove('flip');
            secondCard.classList.remove('flip');
            resetBoard();
        }, 1000);
    }

    function resetBoard() {
        [firstCard, secondCard, lockBoard] = [null, null, false];
    }
</script>

</body>
</html>
