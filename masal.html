<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turluk Masalı 📖</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    :root {
        --ink:#0A1628; --deep:#112240;
        --azure:#2D6FBD; --sky:#6BB8E8; --mist:#C8E8F8; --parchment:#EBF5FD;
        --ember:#FF6B8A; --honey:#F5C957;
        --frost:rgba(255,255,255,.06); --rim:rgba(255,255,255,.12);
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
        font-family:'Poppins',sans-serif; background:var(--ink); color:var(--parchment);
        min-height:100vh; display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        padding:24px 16px 48px; overflow-x:hidden; position:relative;
    }
    canvas#cv { position:fixed; inset:0; z-index:0; pointer-events:none; }

    .card {
        position:relative; z-index:1; width:100%; max-width:600px;
        background:var(--frost); border:1px solid var(--rim);
        border-radius:24px; overflow:hidden;
        backdrop-filter:blur(22px);
        box-shadow:0 30px 70px rgba(0,0,0,.55);
        animation:riseUp .9s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes riseUp { from{opacity:0;transform:translateY(24px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }

    /* Resim alanı */
    .img-wrap {
        position:relative; width:100%; height:clamp(200px,38vw,300px);
        overflow:hidden; background:var(--deep);
    }
    .img-wrap img {
        width:100%; height:100%; object-fit:cover;
        transition:opacity .35s ease;
    }
    .img-overlay {
        position:absolute; inset:0;
        background:linear-gradient(to bottom, transparent 55%, rgba(10,22,40,.85) 100%);
    }
    /* Bölüm numarası — resim üstünde */
    .chapter-badge {
        position:absolute; bottom:14px; left:18px;
        font-size:10px; letter-spacing:3px; text-transform:uppercase;
        color:rgba(200,232,248,.65);
    }

    /* Metin alanı */
    .body { padding:26px 28px 24px; }

    h2 {
        font-family:'Cormorant Garamond',serif;
        font-size:clamp(22px,5vw,30px); font-style:italic; font-weight:600;
        color:var(--mist); margin-bottom:14px; line-height:1.25;
        min-height:2.6em;
        transition:opacity .3s ease;
    }
    p.story {
        font-family:'Cormorant Garamond',serif;
        font-size:clamp(15px,3.5vw,18px); font-style:italic; font-weight:300;
        color:rgba(200,232,248,.82); line-height:1.75; min-height:5.5em;
        transition:opacity .3s ease;
    }

    /* Nokta navigasyonu */
    .dots { display:flex; justify-content:center; gap:7px; margin:22px 0 20px; }
    .dot {
        width:7px; height:7px; border-radius:50%;
        background:rgba(200,232,248,.2); transition:.3s; cursor:pointer;
    }
    .dot.on { background:var(--honey); box-shadow:0 0 8px rgba(245,201,87,.7); transform:scale(1.25); }

    /* Kontroller */
    .ctrl { display:flex; justify-content:space-between; align-items:center; }
    .nav-btn {
        padding:10px 26px; border:none; border-radius:26px;
        font-family:'Poppins',sans-serif; font-size:13px; font-weight:600;
        cursor:pointer; color:#fff; transition:.22s;
        background:linear-gradient(135deg,var(--azure),var(--sky));
        box-shadow:0 6px 18px rgba(45,111,189,.35);
    }
    .nav-btn:hover { filter:brightness(1.1); }
    .nav-btn:active { transform:scale(.97); }
    .nav-btn:disabled { opacity:.3; cursor:not-allowed; filter:none; box-shadow:none; }
    .nav-btn.gold { background:linear-gradient(135deg,var(--ember),var(--honey)); box-shadow:0 6px 18px rgba(245,201,87,.35); }

    .back-btn {
        position:relative; z-index:1; margin-top:20px;
        padding:9px 24px; border:1.5px solid rgba(107,184,232,.38);
        background:transparent; color:var(--sky); border-radius:26px;
        font-family:'Poppins',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:.22s;
    }
    .back-btn:hover { background:var(--sky); color:var(--ink); }
    @media (prefers-reduced-motion:reduce) { .card,.img-wrap img,h2,p.story { animation:none; transition:none; } .card{opacity:1} }
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div class="card">
    <div class="img-wrap">
        <img id="sImg" src="masal1.jpg" alt="">
        <div class="img-overlay"></div>
        <span class="chapter-badge" id="chBadge">Bölüm 1 / 6</span>
    </div>
    <div class="body">
        <h2 id="sTitle">Yükleniyor...</h2>
        <p class="story" id="sText">Yükleniyor...</p>
        <div class="dots" id="dots"></div>
        <div class="ctrl">
            <button class="nav-btn" id="prevBtn" onclick="go(-1)">← Geri</button>
            <button class="nav-btn gold" id="nextBtn" onclick="go(1)">İleri →</button>
        </div>
    </div>
</div>

<button class="back-btn" onclick="location.href='oyun.html'">← Oyun Menüsüne Dön</button>

<script>
/* Canvas */
(function(){
    const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
    let W,H,st=[];
    const resize=()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;};
    const mk=()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+.3,a:Math.random(),da:(Math.random()*.005+.001)*(Math.random()<.5?1:-1)});
    function draw(){ctx.clearRect(0,0,W,H);st.forEach(s=>{s.a=Math.max(.04,Math.min(.88,s.a+s.da));if(s.a<=.04||s.a>=.88)s.da*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill();});requestAnimationFrame(draw);}
    addEventListener('resize',()=>{resize();st=Array.from({length:70},mk);});
    resize();st=Array.from({length:70},mk);draw();
})();

/* Hikaye */
const slides=[
    {img:'masal1.jpg', title:'İlk Bakış', text:'Masalımız başlıyor... Gözlerimi senden alamadığım o ilk anı hatırlıyor musun? Sence aklımdan geçen ilk cümle neydi?'},
    {img:'masal2.jpg', title:'Birlikte Akıp Giderken', text:'Zaman su gibi aktı ve biz her manzarayı birlikte güzelleştirdik. Sence ikimizin yan yana en çok yakıştığı an hangisiydi?'},
    {img:'masal3.jpg', title:'Gülüşlerin Arasında', text:'Bazen çok ciddi, bazen dünyanın en komik iki insanı olduk. Benim hangi huyuma en çok gülersin?'},
    {img:'masal4.jpg', title:'Zaman Durduğunda', text:'Tarihin, yılların ve zamanın durduğu yerlerde bile bizim hikayemiz akmaya devam etti. Benimle gitmek istediğin ilk yer neresi?'},
    {img:'masal5.jpg', title:'Huzurun Adı', text:'Bana böyle huzurla yaslandığında dünyadaki tüm dertler bitiyor. Peki sen bana bakınca ne hissediyorsun?'},
    {img:'masal6.jpg', title:'Ve Sonsuzluğa...', text:'Bu bölümün sonu... ama bizim hikayemiz sonsuz. Bu hikayenin başrolü olduğun için teşekkür ederim. Seni Seviyorum! ❤️'},
];

let idx=0;

function buildDots(){
    const el=document.getElementById('dots');
    el.innerHTML='';
    slides.forEach((_,i)=>{
        const d=document.createElement('div');
        d.className='dot'+(i===idx?' on':'');
        d.onclick=()=>goTo(i);
        el.appendChild(d);
    });
}

function goTo(n){
    const img=document.getElementById('sImg');
    const title=document.getElementById('sTitle');
    const text=document.getElementById('sText');
    img.style.opacity='0'; title.style.opacity='0'; text.style.opacity='0';
    setTimeout(()=>{
        idx=n;
        img.src=slides[idx].img;
        title.textContent=slides[idx].title;
        text.textContent=slides[idx].text;
        document.getElementById('chBadge').textContent=`Bölüm ${idx+1} / ${slides.length}`;
        img.style.opacity='1'; title.style.opacity='1'; text.style.opacity='1';
        document.getElementById('prevBtn').disabled=(idx===0);
        const nb=document.getElementById('nextBtn');
        nb.textContent= idx===slides.length-1 ? 'Bitir ✓' : 'İleri →';
        nb.className='nav-btn '+(idx===slides.length-1?'gold':'');
        buildDots();
    },280);
}

function go(dir){
    if(dir===1 && idx===slides.length-1){ location.href='oyun.html'; return; }
    if(dir===-1 && idx===0) return;
    goTo(idx+dir);
}

/* Klavye */
document.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight') go(1);
    if(e.key==='ArrowLeft')  go(-1);
});

goTo(0);
</script>

<!-- 💖 MOUSE EFEKTİ STİLLERİ 💖 -->
<style>
    /* 1. Fare İmlecini Kalp Yapma */
    body {
        /* İmleci pembe bir kalp SVG'si ile değiştirir (12 12 imlecin merkez noktasıdır) */
        cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path fill='%23FF6B8A' d='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'/></svg>") 12 12, auto;
    }

    /* Butonlar ve linkler üzerine gelindiğinde de imleç kalp kalsın ama parlasın */
    a, button, .flipper, canvas, input, textarea {
        cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path fill='%23F5C957' d='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'/></svg>") 12 12, pointer !important;
    }

    /* 2. Uçuşan Kalplerin Tasarımı */
    .magic-heart {
        position: fixed;
        pointer-events: none; /* Kalplerin tıklamayı engellememesi için çok önemli */
        z-index: 9999;
        font-size: 16px;
        animation: floatAndFade 1s ease-out forwards;
        transform: translate(-50%, -50%); /* Tam farenin ucundan çıkması için */
    }

    /* Kalplerin yukarı doğru uçup kaybolma animasyonu */
    @keyframes floatAndFade {
        0% { 
            transform: translate(-50%, -50%) scale(0.5); 
            opacity: 1; 
        }
        100% { 
            transform: translate(-50%, -150px) scale(1.5); 
            opacity: 0; 
        }
    }
</style>

<!-- 💖 MOUSE EFEKTİ JAVASCRIPT'İ 💖 -->
<script>
(function() {
    // Ekranda çıkacak kalp çeşitleri (istediğin emojiyi ekleyebilirsin)
    const hearts = ["💖", "✨", "💕", "🌸", "💘"];
    
    // Farenin her hareketini dinle
    document.addEventListener('mousemove', function(e) {
        // Çok fazla kalp çıkıp ekranı dondurmasın diye %80 ihtimalle boş geçiyoruz
        if (Math.random() > 0.15) return;

        // Yeni bir kalp elementi oluştur
        const heartEl = document.createElement('div');
        heartEl.className = 'magic-heart';
        
        // Rastgele bir kalp emojisi seç
        heartEl.innerText = hearts[Math.floor(Math.random() * hearts.length)];
        
        // Kalbin çıkacağı konumu farenin konumuna ayarla
        heartEl.style.left = e.clientX + 'px';
        heartEl.style.top = e.clientY + 'px';
        
        // Biraz rastgelelik katalım (hafif sağa veya sola doğru uçsunlar)
        const randomX = (Math.random() - 0.5) * 50; 
        heartEl.style.setProperty('--tx', `${randomX}px`);

        // Elementi sayfaya ekle
        document.body.appendChild(heartEl);
        
        // Animasyon bitince (1 saniye sonra) elementi DOM'dan sil (kasmasını engeller)
        setTimeout(() => {
            heartEl.remove();
        }, 1000);
    });
})();
</script>

</body>
</html>
