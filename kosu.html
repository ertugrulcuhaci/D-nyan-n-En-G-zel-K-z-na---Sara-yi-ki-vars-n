<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonsuz Aşk Koşusu 🏃‍♂️</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
<style>
    :root {
        --sky-top: #4A90D9;
        --sky-bottom: #BFE3FB;
        --blue-deep: #1B3A66;
        --blue-light: #8ECDF0;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 0; background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bottom) 75%);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Poppins', sans-serif;
    }

    #gameArea {
        width: 100%; max-width: 800px; height: 300px; border-bottom: 5px solid #2e8b57;
        position: relative; overflow: hidden;
        background: linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.15) 100%);
    }

    .cloud {
        position: absolute; background: rgba(255,255,255,0.8); border-radius: 50px;
        filter: blur(1px);
    }
    .cloud::before, .cloud::after { content: ""; position: absolute; background: rgba(255,255,255,0.8); border-radius: 50%; }
    .cloud1 { width: 90px; height: 28px; top: 30px; animation: drift 18s linear infinite; }
    .cloud1::before { width: 40px; height: 40px; top: -18px; left: 10px; }
    .cloud1::after { width: 30px; height: 30px; top: -12px; left: 45px; }
    .cloud2 { width: 70px; height: 22px; top: 80px; opacity: 0.7; animation: drift 26s linear infinite; animation-delay: -8s; }
    .cloud2::before { width: 30px; height: 30px; top: -14px; left: 8px; }
    .cloud2::after { width: 24px; height: 24px; top: -10px; left: 35px; }
    @keyframes drift { 0% { left: -120px; } 100% { left: 100%; } }

    #player {
        width: 60px; height: 60px; position: absolute; bottom: 0; left: 50px;
        background-image: url('oyuncu.png'); background-size: cover; background-position: center;
        border-radius: 50%; border: 3px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.15); z-index: 2;
    }
    #playerShadow {
        width: 46px; height: 12px; position: absolute; bottom: -4px; left: 57px;
        background: rgba(20,40,60,0.25); border-radius: 50%; z-index: 1;
        transition: transform 0.3s ease, opacity 0.3s ease;
    }
    #playerShadow.shrink { transform: scale(0.5); opacity: 0.3; }

    .jump { animation: jumpAnim 0.6s linear; }

    @keyframes jumpAnim {
        0% { bottom: 0; } 40% { bottom: 120px; } 50% { bottom: 130px; }
        60% { bottom: 120px; } 100% { bottom: 0; }
    }

    #obstacle {
        width: 40px; height: 40px; position: absolute; bottom: 0; right: -40px;
        background: #e74c3c; border-radius: 10px; display: flex; justify-content: center; align-items: center;
        font-size: 24px; z-index: 2;
    }
    .move { animation: blockAnim 1.5s infinite linear; }

    @keyframes blockAnim {
        0% { right: -40px; } 100% { right: 100%; }
    }

    #scoreBoard {
        position: absolute; top: 10px; left: 20px; font-size: 16px; color: var(--blue-deep);
        background: rgba(255,255,255,0.65); padding: 6px 14px; border-radius: 20px;
        backdrop-filter: blur(6px); font-weight: 600; z-index: 3;
    }

    #winScreen {
        display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        background: rgba(255,255,255,0.9); padding: 30px; border-radius: 20px; text-align: center; z-index: 10;
        border: 2px solid var(--blue-light); box-shadow: 0 0 35px rgba(44,111,189,0.35);
    }
    #winScreen img { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 15px; object-fit: cover;}
    .btn { padding: 10px 20px; background: var(--blue-deep); color: white; border: none; border-radius: 20px; cursor: pointer; }
</style>
</head>
<body onclick="jump()"> <h2 style="color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">Sara'ya Ulaşmak İçin Zıpla!</h2>
    <p style="color: #14385c; margin-top: -15px;">(Ekrana dokun veya tıkla)</p>

    <div id="gameArea">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div id="scoreBoard">Engeller Aşıldı: <span id="score">0</span> / 10</div>
        <div id="playerShadow"></div>
        <div id="player"></div>
        <div id="obstacle">💣</div>

        <div id="winScreen">
            <img src="hedef.png" alt="Sara">
            <h3>Prensesine Ulaştın! ❤️</h3>
            <p>Aşkımız hiçbir engel tanımaz.</p>
            <button class="btn" onclick="window.location.href='./oyun.html'">Menüye Dön</button>
        </div>
    </div>

<script>
    const player = document.getElementById("player");
    const obstacle = document.getElementById("obstacle");
    const shadow = document.getElementById("playerShadow");
    const scoreText = document.getElementById("score");
    let isJumping = false;
    let score = 0;
    let gameActive = false;

    // Oyunu başlat
    setTimeout(() => {
        obstacle.classList.add("move");
        gameActive = true;
    }, 1000);

    function jump() {
        if (!gameActive || isJumping) return;
        isJumping = true;
        player.classList.add("jump");
        shadow.classList.add("shrink");
        setTimeout(() => {
            player.classList.remove("jump");
            shadow.classList.remove("shrink");
            isJumping = false;
            if(gameActive) {
                score++;
                scoreText.innerText = score;
                checkWin();
            }
        }, 600);
    }

    function checkWin() {
        if (score >= 10) {
            gameActive = false;
            obstacle.classList.remove("move");
            obstacle.style.display = "none";
            document.getElementById("winScreen").style.display = "block";
        }
    }

    // Çarpışma kontrolü
    setInterval(() => {
        if (!gameActive) return;

        let playerTop = parseInt(window.getComputedStyle(player).getPropertyValue("bottom"));
        let obstacleRight = parseInt(window.getComputedStyle(obstacle).getPropertyValue("right"));
        let gameWidth = parseInt(window.getComputedStyle(document.getElementById("gameArea")).getPropertyValue("width"));

        // Soldan gelen engelin karakterle aynı hizada olup olmadığını hesaplıyoruz
        let obstacleLeft = gameWidth - obstacleRight - 40;

        // Eğer engel karakterin altındaysa ve karakter zıplamıyorsa oyun biter
        if (obstacleLeft < 100 && obstacleLeft > 50 && playerTop < 40) {
            obstacle.classList.remove("move");
            gameActive = false;
            alert("Eyvah engele takıldın! Baştan başlıyoruz...");
            score = 0;
            scoreText.innerText = score;
            setTimeout(() => {
                obstacle.classList.add("move");
                gameActive = true;
            }, 1000);
        }
    }, 10);
</script>

</body>
</html>
