<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonsuz Aşk Koşusu 🏃</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --ink:#0A1628; --sky-top:#4D9FE0; --sky-bot:#BEE5FA;
        --ground:#2e8b57; --ground-dark:#1a5c38;
        --azure:#2D6FBD; --ember:#FF6B8A; --honey:#F5C957;
        --parchment:#EBF5FD;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
        font-family:'Poppins',sans-serif; overflow:hidden;
        background:var(--ink); color:var(--parchment);
        height:100vh; display:flex; flex-direction:column;
        align-items:center; justify-content:center;
    }
    .hdr { text-align:center; margin-bottom:14px; z-index:10; }
    .hdr h2 { font-size:clamp(16px,4vw,22px); font-weight:700; color:white; text-shadow:0 2px 8px rgba(0,0,0,.5); }
    .hdr p  { font-size:12px; color:rgba(255,255,255,.65); margin-top:3px; }
    #scene {
        width:min(860px,98vw); height:clamp(240px,35vh,320px);
        border-radius:18px; overflow:hidden; position:relative;
        background:linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bot) 68%, var(--ground-dark) 68%, var(--ground) 100%);
        border:2px solid rgba(255,255,255,.1);
        box-shadow:0 20px 60px rgba(0,0,0,.55);
    }
    .hud {
        position:absolute; top:10px; left:14px; right:14px;
        display:flex; justify-content:space-between; align-items:center; z-index:5;
    }
    .hud-pill {
        background:rgba(255,255,255,.18); backdrop-filter:blur(8px);
        border-radius:14px; padding:6px 14px; font-size:13px; font-weight:600; color:white;
    }
    .lives { display:flex; gap:3px; font-size:16px; }
    .cloud {
        position:absolute; background:rgba(255,255,255,.82);
        border-radius:40px; filter:blur(.5px); pointer-events:none;
    }
    .cloud::before, .cloud::after { content:''; position:absolute; background:inherit; border-radius:50%; }
    .c1 { width:80px; height:24px; top:22%; animation:drift 20s linear infinite; }
    .c1::before { width:36px; height:36px; top:-16px; left:8px; }
    .c1::after  { width:28px; height:28px; top:-12px; left:40px; }
    .c2 { width:60px; height:18px; top:40%; opacity:.7; animation:drift 28s linear infinite -10s; }
    .c2::before { width:26px; height:26px; top:-12px; left:6px; }
    .c2::after  { width:20px; height:20px; top:-8px;  left:30px; }
    @keyframes drift { 0%{left:-120px} 100%{left:105%} }
    .ground-stripe {
        position:absolute; bottom:0; height:32%;
        width:100%; pointer-events:none;
        background:repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(0,0,0,.07) 60px, rgba(0,0,0,.07) 62px);
        animation:stripeScroll 0.4s linear infinite;
    }
    @keyframes stripeScroll { from{background-position:0 0} to{background-position:-62px 0} }
    #player {
        position:absolute; bottom:32%; left:70px;
        width:56px; height:56px; border-radius:50%;
        border:3px solid rgba(255,255,255,.9); object-fit:cover;
        background:url('oyuncu.png') center/cover, linear-gradient(135deg,var(--azure),var(--ember));
        box-shadow:0 0 0 3px rgba(255,255,255,.2), 0 6px 18px rgba(0,0,0,.35);
        z-index:3;
    }
    #shadow {
        position:absolute; bottom:calc(32% - 6px); left:75px;
        width:46px; height:10px; border-radius:50%;
        background:rgba(10,22,40,.3); z-index:2;
        transition:transform .25s, opacity .25s;
    }
    #shadow.air { transform:scale(.45); opacity:.2; }
    .obs {
        position:absolute; bottom:32%; z-index:3;
        display:flex; align-items:center; justify-content:center;
        background:rgba(255,255,255,.08); border-radius:10px;
        font-size:28px;
    }
    .overlay {
        display:none; position:absolute; inset:0; z-index:20;
        background:rgba(10,22,40,.82); backdrop-filter:blur(8px);
        flex-direction:column; align-items:center; justify-content:center;
        animation:fadeIn .4s ease;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .overlay.show { display:flex; }
    .ov-box {
        background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14);
        border-radius:22px; padding:32px 28px; text-align:center; max-width:280px;
        backdrop-filter:blur(16px);
    }
    .ov-icon { font-size:50px; margin-bottom:12px; }
    .ov-title { font-size:18px; font-weight:700; color:white; margin-bottom:6px; }
    .ov-sub   { font-size:12px; color:rgba(255,255,255,.6); margin-bottom:18px; line-height:1.5; }
    .ov-img   { width:90px; height:90px; border-radius:50%; object-fit:cover; border:3px solid rgba(255,255,255,.8); margin-bottom:14px; }
    .ov-btn {
        display:inline-block; padding:11px 24px; border:none; border-radius:24px;
        font-family:'Poppins',sans-serif; font-size:13px; font-weight:600; cursor:pointer;
        color:white; margin:4px;
        background:linear-gradient(135deg,var(--azure),#6BB8E8);
        box-shadow:0 6px 18px rgba(45,111,189,.4); transition:.2s;
    }
    .ov-btn:hover { transform:scale(1.05); }
    .ov-btn.ghost { background:transparent; border:1.5px solid rgba(107,184,232,.4); color:#6BB8E8; box-shadow:none; }
    .ov-btn.ghost:hover { background:rgba(107,184,232,.15); }
    .bottom-bar { display:flex; gap:10px; margin-top:14px; z-index:10; }
    .ext-btn {
        padding:9px 22px; border:1.5px solid rgba(107,184,232,.38);
        background:transparent; color:#6BB8E8; border-radius:24px;
        font-family:'Poppins',sans-serif; font-size:12px; font-weight:600; cursor:pointer; transition:.22s;
    }
    .ext-btn:hover { background:#6BB8E8; color:var(--ink); }
    @media (prefers-reduced-motion:reduce) { .cloud,.ground-stripe { animation:none; } }
</style>
</head>
<body>

<div class="hdr">
    <h2>Sara'ya Ulaşmak İçin Zıpla! 💙</h2>
    <p>📱 Dokun &nbsp;·&nbsp; 🖱️ Tıkla &nbsp;·&nbsp; ⌨️ Boşluk</p>
</div>

<div id="scene">
    <div class="hud">
        <div class="hud-pill">Engel: <span id="sc">0</span> / 10</div>
        <div class="lives" id="lives">❤️❤️❤️</div>
        <div class="hud-pill">En İyi: <span id="best">0</span></div>
    </div>

    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="ground-stripe"></div>

    <div id="shadow"></div>
    <div id="player"></div>

    <div class="overlay show" id="startScreen">
        <div class="ov-box">
            <div class="ov-icon">🏃‍♂️</div>
            <h3 class="ov-title">Sonsuz Aşk Koşusu</h3>
            <p class="ov-sub">10 engeli aş ve Sara'ya ulaş!<br>3 canın var, dikkatli kullan 💙</p>
            <button class="ov-btn" onclick="startGame()">Başla!</button>
        </div>
    </div>

    <div class="overlay" id="hitScreen">
        <div class="ov-box">
            <div class="ov-icon">💥</div>
            <h3 class="ov-title" id="hitTitle">Eyvah!</h3>
            <p class="ov-sub" id="hitSub">Engele takıldın ama canın var...</p>
            <button class="ov-btn" onclick="continueGame()">Devam Et!</button>
        </div>
    </div>

    <div class="overlay" id="winScreen">
        <div class="ov-box">
            <img class="ov-img" src="hedef.png" alt="Sara">
            <h3 class="ov-title">Prensesine Ulaştın! ❤️</h3>
            <p class="ov-sub">Aşkımız hiçbir engel tanımaz.<br><span id="winStats"></span></p>
            <button class="ov-btn" onclick="startGame()">Tekrar Oyna</button>
            <button class="ov-btn ghost" onclick="location.href='oyun.html'">← Menü</button>
        </div>
    </div>
</div>

<div class="bottom-bar">
    <button class="ext-btn" onclick="startGame()">🔄 Yeniden</button>
    <button class="ext-btn" onclick="location.href='oyun.html'">← Menü</button>
</div>

<script>
const player  = document.getElementById('player');
const shadow  = document.getElementById('shadow');
const scText  = document.getElementById('sc');
const bestTxt = document.getElementById('best');
const livesEl = document.getElementById('lives');

let score=0, lives=3, best=parseInt(localStorage.getItem('runBest')||'0');
let active=false, jumping=false, raf=null;
let obstacles=[], speed=4.5, frameCount=0, nextSpawn=100;

bestTxt.textContent=best;

function loop(){
    if(!active)return;
    frameCount++;

    if(frameCount>=nextSpawn){
        spawnObs();
        nextSpawn=frameCount + 90 + Math.floor(Math.random()*60) - Math.floor(score*2);
    }

    // Geriye doğru gezerek, splice ile dizi karışmasını önlüyoruz
    const sceneWidth = parseFloat(getComputedStyle(document.getElementById('scene')).width);
    for (let i = obstacles.length - 1; i >= 0; i--) {
        const ob = obstacles[i];
        let x = parseFloat(ob.style.right) || -60;
        x += speed;
        ob.style.right = x + 'px';

        if (x > sceneWidth + 80) {
            ob.remove();
            obstacles.splice(i, 1);
            score++;
            scText.textContent = score;
            speed = 4.5 + score * 0.32;
            if (score >= 10) { endGame(true); return; }
            continue;
        }

        if (checkHit(ob)) {
            gotHit(ob, i);
            continue;
        }
    }

    raf=requestAnimationFrame(loop);
}

function spawnObs(){
    const emojis=['💣','🌵','⚡','🪨','🔥'];
    const sizes=[36,40,44,38,42];
    const idx=Math.floor(Math.random()*emojis.length);
    const ob=document.createElement('div');
    ob.className='obs';
    ob.textContent=emojis[idx];
    const sz=sizes[idx];
    ob.style.cssText=`width:${sz}px;height:${sz}px;right:-${sz}px;`;
    document.getElementById('scene').appendChild(ob);
    obstacles.push(ob);
}

function checkHit(ob){
    const pr=player.getBoundingClientRect();
    const or=ob.getBoundingClientRect();
    const m=10;
    return !(pr.right-m<or.left+m || pr.left+m>or.right-m || pr.bottom-m<or.top+m || pr.top+m>or.bottom-m);
}

function gotHit(ob,i){
    ob.remove(); obstacles.splice(i,1);
    lives--;
    updateLives();
    if(lives<=0){ endGame(false); return; }
    active=false; cancelAnimationFrame(raf);
    showOverlay('hitScreen');
    document.getElementById('hitTitle').textContent = lives===2 ? 'Dikkatli ol! 😬' : 'Son canın! 💔';
    document.getElementById('hitSub').textContent   = `${lives} canın kaldı. Devam et!`;
}

function updateLives(){
    livesEl.textContent = '❤️'.repeat(lives) + '🖤'.repeat(3-lives);
}

function jump(){
    if(!active||jumping)return;
    jumping=true;
    shadow.classList.add('air');
    let t=null;
    const H = 120; // zıplama yüksekliği (piksel)
    function anim(ts){
        if(!t)t=ts;
        const p=(ts-t)/580, h=H*4*p*(1-p);
        player.style.bottom=(32+Math.max(0,h)/parseFloat(getComputedStyle(document.getElementById('scene')).height)*100)+'%';
        if(p<1){ requestAnimationFrame(anim); }
        else { player.style.bottom='32%'; shadow.classList.remove('air'); jumping=false; }
    }
    requestAnimationFrame(anim);
}

document.addEventListener('keydown',e=>{ if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();jump();} });
document.getElementById('scene').addEventListener('click',jump);
document.getElementById('scene').addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});

function hideAll(){
    ['startScreen','hitScreen','winScreen'].forEach(id=>document.getElementById(id).classList.remove('show'));
}
function showOverlay(id){ hideAll(); document.getElementById(id).classList.add('show'); }

function startGame(){
    hideAll(); active=false; cancelAnimationFrame(raf);
    obstacles.forEach(o=>o.remove()); obstacles=[];
    score=0; lives=3; speed=4.5; frameCount=0; nextSpawn=100;
    jumping=false; player.style.bottom='32%';
    scText.textContent=0; updateLives();
    active=true; loop();
}

function continueGame(){
    hideAll();
    obstacles.forEach(o=>o.remove()); obstacles=[];
    jumping=false; player.style.bottom='32%';
    frameCount=0; nextSpawn=80;
    active=true; loop();
}

function endGame(won){
    active=false; cancelAnimationFrame(raf);
    if(won){
        if(score>best){ best=score; localStorage.setItem('runBest',best); bestTxt.textContent=best; }
        document.getElementById('winStats').textContent=`${score} engeli geçtiniz 🎉`;
        showOverlay('winScreen');
        rain(['❤️','💙','⭐','✨'],50);
    } else {
        showOverlay('startScreen');
        document.querySelector('#startScreen .ov-title').textContent='Oyun Bitti! 😢';
        document.querySelector('#startScreen .ov-sub').textContent=`${score} engel geçebildin. Tekrar dene!`;
    }
}

function rain(s,n){
    const scene=document.getElementById('scene');
    for(let i=0;i<n;i++){
        const el=document.createElement('div');
        el.style.cssText=`position:absolute;left:${Math.random()*100}%;top:-20px;font-size:${Math.random()*10+10}px;z-index:15;pointer-events:none;animation:fall ${(Math.random()*2+2).toFixed(2)}s linear ${(Math.random()*1.5).toFixed(2)}s forwards;`;
        el.textContent=s[Math.floor(Math.random()*s.length)];
        scene.appendChild(el);
        setTimeout(()=>el.remove(),5000);
    }
    if(!document.querySelector('#fall-s')){ const st=document.createElement('style');st.id='fall-s';st.textContent='@keyframes fall{to{transform:translateY(110%);opacity:0}}';document.head.appendChild(st); }
}
</script>
</body>
</html>
