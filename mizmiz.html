<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mızmızlık Köşesi 😤</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;0,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    :root {
        --ink:#0A1628; --deep:#112240;
        --azure:#2D6FBD; --sky:#6BB8E8; --mist:#C8E8F8; --parchment:#EBF5FD;
        --ember:#FF6B8A; --honey:#F5C957;
        --frost:rgba(255,255,255,.06); --rim:rgba(255,255,255,.11);
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
        font-family:'Poppins',sans-serif; background:var(--ink); color:var(--parchment);
        min-height:100vh; display:flex; flex-direction:column;
        align-items:center; padding:36px 16px 72px;
        overflow-x:hidden; position:relative;
    }
    canvas#cv { position:fixed; inset:0; z-index:0; pointer-events:none; }

    .page-head { position:relative; z-index:1; text-align:center; margin-bottom:34px; }
    .eyebrow { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,107,138,.45); margin-bottom:10px; }
    h1 {
        font-family:'Cormorant Garamond',serif; font-size:clamp(30px,8vw,50px);
        font-style:italic; font-weight:600; line-height:1;
        background:linear-gradient(135deg, var(--ember), var(--honey));
        -webkit-background-clip:text; background-clip:text; color:transparent;
        margin-bottom:8px;
    }
    .sub { font-size:12px; font-weight:300; color:rgba(200,232,248,.45); }

    /* Genel kart */
    .box {
        position:relative; z-index:1; width:100%; max-width:520px;
        background:var(--frost); border:1px solid var(--rim);
        border-radius:20px; padding:22px 22px;
        backdrop-filter:blur(16px);
        box-shadow:0 14px 40px rgba(0,0,0,.32);
        margin-bottom:16px;
    }
    .box-label {
        font-size:10px; letter-spacing:2.5px; text-transform:uppercase;
        color:rgba(200,232,248,.38); margin-bottom:14px; text-align:center;
    }

    /* Ölçek */
    .scale-row { display:flex; gap:8px; justify-content:center; margin-bottom:12px; }
    .sc-btn {
        width:48px; height:48px; border-radius:50%;
        border:1.5px solid rgba(255,255,255,.1);
        background:rgba(255,255,255,.04); cursor:pointer; font-size:22px;
        display:flex; align-items:center; justify-content:center;
        transition:.2s; flex-shrink:0;
    }
    .sc-btn:hover { transform:scale(1.18); border-color:var(--ember); }
    .sc-btn.on { border-color:var(--ember); background:rgba(255,107,138,.2); transform:scale(1.12); }
    .scale-reply { text-align:center; font-size:13px; min-height:40px; color:rgba(200,232,248,.82); line-height:1.5; }

    /* Şikayet grid */
    .c-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .c-btn {
        padding:13px 10px; border-radius:14px;
        border:1px solid rgba(255,255,255,.09);
        background:rgba(255,255,255,.05); color:var(--parchment);
        cursor:pointer; font-family:'Poppins',sans-serif; font-size:12px; font-weight:600;
        transition:.2s; line-height:1.35; text-align:center;
    }
    .c-btn:hover { background:rgba(255,107,138,.15); border-color:rgba(255,107,138,.35); transform:scale(1.03); }
    .c-btn:active { transform:scale(.97); }

    /* Sayaç */
    .counter-inner { text-align:center; }
    .count-num {
        font-size:58px; font-weight:600; line-height:1; margin:6px 0 4px;
        color:var(--ember); text-shadow:0 0 24px rgba(255,107,138,.45);
    }
    .count-sub { font-size:12px; color:rgba(200,232,248,.45); margin-bottom:14px; }
    .count-btn {
        padding:11px 28px; border:none; border-radius:30px;
        font-family:'Poppins',sans-serif; font-size:13px; font-weight:600;
        cursor:pointer; color:#fff;
        background:linear-gradient(135deg, var(--ember), var(--honey));
        box-shadow:0 6px 18px rgba(255,107,138,.35); transition:.22s;
    }
    .count-btn:hover { transform:scale(1.06); }
    .count-btn:active { transform:scale(.97); }

    /* Çözüm */
    .sol-btn {
        display:block; width:100%; padding:12px 14px; margin-bottom:7px;
        border-radius:12px; border:1px solid rgba(107,184,232,.15);
        background:rgba(255,255,255,.04); color:var(--parchment);
        cursor:pointer; font-family:'Poppins',sans-serif; font-size:12px; text-align:left;
        transition:.2s;
    }
    .sol-btn:hover { background:rgba(107,184,232,.12); border-color:rgba(107,184,232,.35); }
    .sol-btn:last-child { margin-bottom:0; }

    /* Popup */
    #popup {
        position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
        background:rgba(14,28,52,.97); border:1px solid rgba(255,255,255,.12);
        backdrop-filter:blur(20px); border-radius:22px;
        padding:22px 26px; max-width:340px; width:90%; text-align:center;
        z-index:30; box-shadow:0 20px 50px rgba(0,0,0,.55), 0 0 28px rgba(255,107,138,.1);
        opacity:0; pointer-events:none;
        transition:opacity .3s ease, transform .3s ease;
    }
    #popup.open { opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
    .p-emoji { font-size:44px; margin-bottom:10px; display:block; }
    .p-text { font-size:14px; line-height:1.6; color:rgba(235,245,253,.9); }
    .p-close {
        margin-top:14px; padding:8px 22px; border:none; border-radius:20px;
        background:rgba(255,107,138,.28); color:#fff;
        font-family:'Poppins',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:.2s;
    }
    .p-close:hover { background:rgba(255,107,138,.45); }

    .back-btn {
        position:relative; z-index:1; margin-top:10px;
        padding:10px 26px; border:1.5px solid rgba(107,184,232,.38);
        background:transparent; color:var(--sky); border-radius:30px;
        font-family:'Poppins',sans-serif; font-weight:600; font-size:13px; cursor:pointer; transition:.25s;
    }
    .back-btn:hover { background:var(--sky); color:var(--ink); }

    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px) rotate(-4deg)} 40%{transform:translateX(6px) rotate(4deg)} 60%{transform:translateX(-4px) rotate(-2deg)} 80%{transform:translateX(4px) rotate(2deg)} }
    .shake { animation:shake .45s ease; }
    @media (prefers-reduced-motion:reduce) { * { animation:none !important; } }
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div class="page-head">
    <p class="eyebrow">Sadece senin için</p>
    <h1>Mızmızlık Köşesi</h1>
    <p class="sub">Şikayet et, geçer... muhtemelen 😏</p>
</div>

<!-- Ölçek -->
<div class="box">
    <p class="box-label">Bugünkü mızmızlık seviyesi</p>
    <div class="scale-row">
        <button class="sc-btn" onclick="setScale(this,1)">😌</button>
        <button class="sc-btn" onclick="setScale(this,2)">🙄</button>
        <button class="sc-btn" onclick="setScale(this,3)">😤</button>
        <button class="sc-btn" onclick="setScale(this,4)">😠</button>
        <button class="sc-btn" onclick="setScale(this,5)">🤬</button>
    </div>
    <p class="scale-reply" id="scaleReply">Seviyeni seç bakalım...</p>
</div>

<!-- Şikayetler -->
<div class="box">
    <p class="box-label">Bugün ne hakkında mızmızlamak istiyorsun?</p>
    <div class="c-grid">
        <button class="c-btn" onclick="pop('hava')">☁️ Hava çok sıcak</button>
        <button class="c-btn" onclick="pop('yorgun')">😪 Çok yorgunum</button>
        <button class="c-btn" onclick="pop('aciktim')">🍕 Acıktım</button>
        <button class="c-btn" onclick="pop('izlemek')">📺 Bir şey izlemek istiyorum</button>
        <button class="c-btn" onclick="pop('sikildi')">🥱 Sıkıldım</button>
        <button class="c-btn" onclick="pop('ozledim')">🥺 Seni özledim</button>
        <button class="c-btn" onclick="pop('uyumak')">🛏️ Uyumak istiyorum</button>
        <button class="c-btn" onclick="pop('diger')">😒 Başka bir şey</button>
    </div>
</div>

<!-- Sayaç -->
<div class="box">
    <div class="counter-inner">
        <p class="box-label">Bu sayfayı bugüne kadar</p>
        <p class="count-num" id="cNum">0</p>
        <p class="count-sub" id="cSub">kez — mızmızlamaya yeni başladın 😇</p>
        <button class="count-btn" onclick="bump()">😤 Şikayet Et!</button>
    </div>
</div>

<!-- Çözüm -->
<div class="box">
    <p class="box-label">Çözüm önerileri (ciddiye alma) 😂</p>
    <button class="sol-btn" onclick="pop('cozum1')">🍦 Dondurma ye, her şey düzelir</button>
    <button class="sol-btn" onclick="pop('cozum2')">💤 Uyu, yarın tekrar düşünürsün</button>
    <button class="sol-btn" onclick="pop('cozum3')">📞 Beni ara, konuşalım</button>
    <button class="sol-btn" onclick="pop('cozum4')">🎵 Müzik aç, dans et</button>
</div>

<button class="back-btn" onclick="location.href='index.html'">← Ana Sayfaya Dön</button>

<!-- Popup -->
<div id="popup">
    <span class="p-emoji" id="pEmoji">😄</span>
    <p class="p-text" id="pText"></p>
    <button class="p-close" onclick="closePopup()">Tamam 💙</button>
</div>

<script>
/* Canvas */
(function(){
    const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
    let W,H,st=[];
    const resize=()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;};
    const mk=()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+.3,a:Math.random(),da:(Math.random()*.005+.001)*(Math.random()<.5?1:-1)});
    function draw(){
        ctx.clearRect(0,0,W,H);
        st.forEach(s=>{
            s.a=Math.max(.04,Math.min(.88,s.a+s.da));
            if(s.a<=.04||s.a>=.88)s.da*=-1;
            ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
            ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    addEventListener('resize',()=>{resize();st=Array.from({length:75},mk);});
    resize();st=Array.from({length:75},mk);draw();
})();

const scaleTexts={
    1:"Vay be, bugün gayet iyisin! Bu nadir bir olay, kutlayalım mı? 🎉",
    2:"Gözlerini devirme tatlım, seni görüyorum 😏",
    3:"Orta seviye mızmızlık — klasik bir Sara günü bu 😄 Seni yine de seviyorum.",
    4:"Dur dur, nefes al. Çok kızgınsın ama yine de çok tatlısın 😂",
    5:"Tamam tamam, tam gaz mızmızlık modu! Bu bir rekordur herhalde 😂 Ama bak, seni seviyor olduğum değişmiyor."
};
const responses={
    hava:{e:'☀️',t:"Hava sıcak diyorsun ama sen zaten güneş gibisin, ne fark eder? 😂 Dondurma ister misin, canım?"},
    yorgun:{e:'😴',t:"Evet biliyorum, çok yoruldun. Bilhassa mızmızlamaktan... Söyle bakalım, bugün kaç saat uyudun?"},
    aciktim:{e:'🍕',t:"Her zaman acıkıyorsun, bu sürpriz değil 😄 Ne yemek istiyorsun? Hadi söyle, en azından birlikte düşünelim."},
    izlemek:{e:'🎬',t:"Bana mı sordun? Tabii isterim! Seç bakalım ne izleyeceğiz, ama sonra 'sıkıcıydı' demeyeceksin ha!"},
    sikildi:{e:'🥱',t:"Sıkıldın mı? Hadi şu oyunları oyna biraz — özellikle koşu oyununu 😏 Ya da beni ara, ben hiç sıkıcı değilim..."},
    ozledim:{e:'💙',t:"Ben de seni özledim. Şu an buraya bakıyor olman zaten yeterli. Ama gerçekten özlediysen bil ki ben de tam o kadar özlüyorum."},
    uyumak:{e:'🛏️',t:"E git yat o zaman?? Kim tutuyor seni?? ... Ama önce bana iyi geceler de 😄"},
    diger:{e:'🤔',t:"Ne olursa olsun, bana söylemeni istiyorum. Bana söyle 😊 Her şeyin geçer."},
    cozum1:{e:'🍦',t:"Bu bilimsel olarak kanıtlanmıştır: dondurma her şeyi düzeltir. Özellikle çikolatalı. Özellikle seninle yenileni 🍫"},
    cozum2:{e:'💤',t:"En iyi tavsiye buydu zaten. Her şey uyku ile çözülür. Bak ben söyledim, doktor değilim ama genelde haklıyım 😂"},
    cozum3:{e:'📞',t:"Aslında bu fikri onaylıyorum. Aramak için bahanene gerek yok ki? Sadece ara, konuşuruz 💙"},
    cozum4:{e:'🎵',t:"Müzik aç, dans et — ve lütfen videonla gönder 😂 Ciddiyim, izlemek isterim!"}
};

function setScale(btn,n){
    document.querySelectorAll('.sc-btn').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    btn.classList.add('shake'); setTimeout(()=>btn.classList.remove('shake'),450);
    document.getElementById('scaleReply').textContent=scaleTexts[n];
}

let pTimer=null;
function pop(key){
    const r=responses[key]; if(!r)return;
    document.getElementById('pEmoji').textContent=r.e;
    document.getElementById('pText').textContent=r.t;
    document.getElementById('popup').classList.add('open');
    if(pTimer)clearTimeout(pTimer);
    pTimer=setTimeout(closePopup,9000);
}
function closePopup(){ document.getElementById('popup').classList.remove('open'); }

let cnt=parseInt(sessionStorage.getItem('miz')||'0');
updateCounter();
function bump(){
    cnt++;
    sessionStorage.setItem('miz',cnt);
    updateCounter();
    const btn=document.querySelector('.count-btn');
    btn.classList.add('shake'); setTimeout(()=>btn.classList.remove('shake'),450);
    pop(['hava','yorgun','aciktim','sikildi','ozledim','diger'][Math.floor(Math.random()*6)]);
}
function updateCounter(){
    document.getElementById('cNum').textContent=cnt;
    const t=['mızmızlamaya yeni başladın 😇','gayet normaldir 😄','uzman seviyeye yaklaşıyorsun 😏','profesyonel mızmızlamacı unvanı yakında 🏆','bu bir rekor olmalı 😂','lütfen yardım al 😂❤️'];
    document.getElementById('cSub').textContent='kez — '+t[Math.min(Math.floor(cnt/3),t.length-1)];
}
</script>
</body>
</html>
