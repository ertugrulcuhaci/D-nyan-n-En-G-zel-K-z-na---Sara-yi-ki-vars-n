<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emine Sara'm ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink:#0A1628; --deep:#112240; --mid:#1C3A64;
            --azure:#2D6FBD; --sky:#6BB8E8; --mist:#C8E8F8; --parchment:#EBF5FD;
            --ember:#FF6B8A; --honey:#F5C957;
            --frost:rgba(255,255,255,.06); --rim:rgba(255,255,255,.13);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

        body {
            font-family:'Poppins',sans-serif; background:var(--ink);
            min-height:100vh; display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            overflow:hidden; position:relative; color:var(--parchment);
        }

        /* ── Foto arka plan ── */
        .photo-bg {
            position:fixed; inset:0; z-index:0;
            display:flex; flex-wrap:wrap; gap:4px; align-content:flex-start;
            filter:blur(16px) brightness(.18) saturate(.65);
            transform:scale(1.12); pointer-events:none; overflow:hidden;
        }
        .photo-bg img{width:190px;height:135px;object-fit:cover;flex-shrink:0;}

        /* ── Yıldız canvas ── */
        #canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}

        /* ── Kayan yıldız ── */
        .shoot{position:fixed;width:2px;height:2px;background:#fff;border-radius:50%;
            box-shadow:0 0 6px 2px rgba(255,255,255,.7);animation:shoot 8s linear infinite;opacity:0;z-index:2;pointer-events:none;}
        .shoot:nth-child(1){top:8%;left:0%;animation-delay:2s;animation-duration:7s;}
        .shoot:nth-child(2){top:20%;left:0%;animation-delay:11s;animation-duration:6s;}
        @keyframes shoot{0%{transform:translate(0,0);opacity:0;}3%{opacity:.9;}20%{transform:translate(65vw,32vh);opacity:0;}100%{opacity:0;}}

        /* ── Ana kart ── */
        .card{
            position:relative;z-index:10;
            background:var(--frost);border:1px solid var(--rim);border-radius:28px;
            padding:44px 40px 40px;max-width:92%;width:480px;
            backdrop-filter:blur(24px);
            box-shadow:0 30px 70px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.04),inset 0 1px 0 rgba(255,255,255,.08);
            animation:riseUp 1s cubic-bezier(.16,1,.3,1) both;
        }
        @keyframes riseUp{from{opacity:0;transform:translateY(32px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
        .top-line{width:48px;height:2px;margin:0 auto 22px;background:linear-gradient(90deg,var(--ember),var(--honey));border-radius:2px;}
        .name{
            font-family:'Cormorant Garamond',serif;font-size:clamp(30px,7vw,46px);
            font-weight:600;font-style:italic;letter-spacing:.5px;line-height:1.1;
            background:linear-gradient(135deg,var(--honey) 0%,var(--sky) 60%,var(--mist) 100%);
            -webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:8px;
        }
        .tagline{font-size:12px;font-weight:300;letter-spacing:2px;text-transform:uppercase;color:rgba(200,232,248,.45);margin-bottom:32px;}

        /* ── Sayaç ── */
        .timer-section{margin-bottom:30px;}
        .timer-label{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(200,232,248,.4);margin-bottom:12px;transition:color .4s;}
        .timer-label.bday{color:rgba(255,107,138,.6);}
        .timer-row{display:flex;justify-content:center;gap:8px;}
        .t-box{flex:1;max-width:80px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px 6px 10px;position:relative;overflow:hidden;transition:border-color .4s,background .4s;}
        .t-box::before{content:'';position:absolute;inset:0;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.04) 0%,transparent 100%);pointer-events:none;}
        .t-box.bday{border-color:rgba(255,107,138,.22);background:rgba(255,107,138,.07);}
        .t-num{display:block;font-size:22px;font-weight:600;line-height:1;color:var(--sky);text-shadow:0 0 16px rgba(107,184,232,.4);transition:color .4s;font-variant-numeric:tabular-nums;}
        .t-box.bday .t-num{color:var(--ember);text-shadow:0 0 16px rgba(255,107,138,.4);}
        .t-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(200,232,248,.45);margin-top:5px;display:block;}

        /* ── Doğum günü banner ── */
        #bday-banner{display:none;border:1px solid rgba(255,107,138,.3);border-radius:12px;padding:10px 16px;margin-bottom:20px;font-size:13px;font-weight:500;color:rgba(235,245,253,.85);background:rgba(255,107,138,.1);animation:glow 2.5s ease-in-out infinite;}
        @keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(255,107,138,0);}50%{box-shadow:0 0 22px 4px rgba(255,107,138,.2);}}

        /* ── Butonlar ── */
        .btn-stack{display:flex;flex-direction:column;gap:10px;}
        .btn{display:block;width:100%;padding:14px 20px;border:none;border-radius:50px;font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;cursor:pointer;color:#fff;text-align:center;transition:transform .2s,box-shadow .2s;letter-spacing:.3px;}
        .btn:hover{transform:translateY(-2px) scale(1.02);}
        .btn:active{transform:scale(.98);}
        .btn-games{background:linear-gradient(135deg,var(--azure),var(--sky));box-shadow:0 8px 24px rgba(45,111,189,.4);}
        .btn-ask{background:linear-gradient(135deg,var(--ember),var(--honey));box-shadow:0 8px 24px rgba(255,107,138,.35);}
        .btn-bday{display:none;background:linear-gradient(135deg,#C94040,var(--ember));box-shadow:0 8px 24px rgba(201,64,64,.4);}
        .signature{margin-top:26px;font-size:11px;font-weight:300;color:rgba(200,232,248,.25);letter-spacing:1.5px;}

        /* ──── MÜZİK MODAL ──── */
        #music-modal {
            position:fixed;inset:0;z-index:300;
            background:rgba(10,22,40,.92);backdrop-filter:blur(22px);
            display:none;align-items:center;justify-content:center;
        }
        #music-modal.active { display:flex; }
        .m-box {
            background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);
            border-radius:28px;padding:44px 38px;text-align:center;max-width:340px;width:90%;
            backdrop-filter:blur(24px);box-shadow:0 30px 70px rgba(0,0,0,.6);
            opacity:0;transform:translateY(28px) scale(.97);
            transition:opacity .7s ease,transform .7s cubic-bezier(.16,1,.3,1);
        }
        #music-modal.active .m-box{opacity:1;transform:translateY(0) scale(1);}
        /* Vinyl */
        .vinyl {
            width:82px;height:82px;border-radius:50%;margin:0 auto 22px;
            background:conic-gradient(#1a1a3a 0deg,#2e2e60 90deg,#1a1a3a 180deg,#2e2e60 270deg,#1a1a3a 360deg);
            position:relative;box-shadow:0 6px 22px rgba(0,0,0,.55),0 0 0 2px rgba(255,255,255,.06);
            animation:vinylSpin 2.8s linear infinite;
        }
        @keyframes vinylSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
        .vinyl::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:22px;height:22px;border-radius:50%;background:radial-gradient(circle,#444,#111);border:2px solid rgba(255,255,255,.15);}
        .vinyl-lines{position:absolute;inset:8px;border-radius:50%;border:1px solid rgba(255,255,255,.06);}
        .m-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-style:italic;font-weight:600;color:var(--mist);margin-bottom:8px;}
        .m-sub{font-size:12px;color:rgba(200,232,248,.5);margin-bottom:30px;line-height:1.7;}
        .m-btns{display:flex;flex-direction:column;gap:10px;}
        .m-btn{padding:13px 24px;border:none;border-radius:30px;font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;cursor:pointer;color:#fff;transition:.2s;}
        .m-btn.yes{background:linear-gradient(135deg,var(--ember),var(--honey));box-shadow:0 8px 22px rgba(255,107,138,.35);}
        .m-btn.yes:hover{transform:scale(1.04);box-shadow:0 10px 28px rgba(255,107,138,.5);}
        .m-btn.no{background:transparent;border:1.5px solid rgba(200,232,248,.18);color:rgba(200,232,248,.5);font-size:12px;padding:9px;}
        .m-btn.no:hover{border-color:rgba(200,232,248,.4);color:rgba(200,232,248,.8);}

        /* ──── YÜZEN MÜZİK ÇUBUĞU ──── */
        #music-bar {
            display:none;position:fixed;bottom:20px;left:20px;z-index:100;
            background:rgba(12,24,46,.93);border:1px solid rgba(255,255,255,.12);
            border-radius:50px;padding:9px 14px 9px 11px;
            backdrop-filter:blur(22px);box-shadow:0 8px 30px rgba(0,0,0,.45);
            align-items:center;gap:10px;cursor:pointer;max-width:210px;
            transition:border-color .25s,box-shadow .25s;
        }
        #music-bar:hover{border-color:rgba(255,107,138,.35);box-shadow:0 10px 36px rgba(0,0,0,.5),0 0 18px rgba(255,107,138,.12);}
        .m-vinyl-sm{width:32px;height:32px;border-radius:50%;flex-shrink:0;
            background:conic-gradient(#1a1a3a 0deg,#2e2e60 90deg,#1a1a3a 180deg,#2e2e60 270deg,#1a1a3a 360deg);
            position:relative;animation:vinylSpin 3s linear infinite;
            box-shadow:0 2px 8px rgba(0,0,0,.4);}
        .m-vinyl-sm::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;background:#222;border:1.5px solid rgba(255,255,255,.15);}
        .m-vinyl-sm.paused{animation-play-state:paused;}
        .m-info{flex:1;overflow:hidden;min-width:0;}
        .m-name{font-size:11px;font-weight:600;color:var(--mist);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .m-status{font-size:9px;color:rgba(200,232,248,.42);letter-spacing:1.5px;text-transform:uppercase;}
        .m-toggle{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,107,138,.3);background:rgba(255,107,138,.2);color:#fff;font-size:10px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s;}
        .m-toggle:hover{background:rgba(255,107,138,.4);}

        /* Hidden YouTube container */
        #yt-player{position:fixed;left:-4px;bottom:-4px;width:4px;height:4px;opacity:0;pointer-events:none;overflow:hidden;}

        @media(max-width:400px){.card{padding:32px 22px 30px;}.t-num{font-size:18px;}}
        @media(prefers-reduced-motion:reduce){.card,.shoot,.vinyl,.m-vinyl-sm{animation:none;}.card{opacity:1;}}
    </style>
</head>
<body>

<!-- Foto arka plan -->
<div class="photo-bg" aria-hidden="true">
    <img src="masal1.jpg"><img src="masal2.jpg"><img src="masal3.jpg"><img src="masal4.jpg">
    <img src="masal5.jpg"><img src="masal6.jpg"><img src="hafiza1.jpg"><img src="hafiza2.jpg">
    <img src="hafiza3.jpg"><img src="hafiza4.jpg"><img src="masal1.jpg"><img src="masal3.jpg">
</div>

<canvas id="canvas"></canvas>
<div class="shoot"></div>
<div class="shoot"></div>

<!-- ── Müzik Modal ── -->
<div id="music-modal">
    <div class="m-box">
        <div class="vinyl">
            <div class="vinyl-lines"></div>
            <div class="vinyl-lines" style="inset:16px;"></div>
        </div>
        <h2 class="m-title">Sana Özel Bir Şarkı</h2>
        <p class="m-sub">Bu anı müzikle daha güzel kılalım mı?<br>Seni düşünerek seçtim... 🎵</p>
        <div class="m-btns">
            <button class="m-btn yes" onclick="startMusic()">🎶 Müziği Aç</button>
            <button class="m-btn no" onclick="skipMusic()">Sessiz devam et</button>
        </div>
    </div>
</div>

<!-- Hidden YouTube player -->
<div id="yt-player"></div>

<!-- ── Yüzen Müzik Çubuğu ── -->
<div id="music-bar" onclick="toggleMusic()">
    <div class="m-vinyl-sm" id="m-vinyl-sm"></div>
    <div class="m-info">
        <p class="m-name" id="m-name">Yükleniyor...</p>
        <p class="m-status" id="m-status">Çalıyor</p>
    </div>
    <button class="m-toggle" id="m-toggle" onclick="event.stopPropagation();toggleMusic()">⏸</button>
</div>

<div class="card">
    <div class="top-line"></div>
    <h1 class="name">Emine Sara Gözükara</h1>
    <p class="tagline">Gökyüzündeki en parlak yıldızım ✦</p>

    <div id="bday-banner">🎂 Bugün doğum günün! Sürprize bak 🎉</div>

    <div class="timer-section">
        <p class="timer-label" id="tlabel">Birlikteliğimiz</p>
        <div class="timer-row">
            <div class="t-box" id="tb-d"><span class="t-num" id="td">00</span><span class="t-lbl" id="tl-d">Gün</span></div>
            <div class="t-box" id="tb-h"><span class="t-num" id="th">00</span><span class="t-lbl" id="tl-h">Saat</span></div>
            <div class="t-box" id="tb-m"><span class="t-num" id="tm">00</span><span class="t-lbl" id="tl-m">Dk</span></div>
            <div class="t-box" id="tb-s"><span class="t-num" id="ts">00</span><span class="t-lbl" id="tl-s">Sn</span></div>
        </div>
    </div>

    <div class="btn-stack">
        <button class="btn btn-games" onclick="location.href='oyun.html'">🎮 &nbsp;Oyun Oynayalım</button>
        <button class="btn btn-ask"   onclick="location.href='soru.html'">🥺 &nbsp;Sana Bir Sorum Var</button>
        <button class="btn btn-bday"  id="bdayBtn" onclick="location.href='dogumgunu.html'">🎂 &nbsp;Doğum Günü Sürprizi</button>
    </div>
    <p class="signature">with love · always</p>
</div>

<script>
/* ── Yıldız Canvas ── */
(function(){
    const cv=document.getElementById('canvas'),ctx=cv.getContext('2d');
    let W,H,st=[];
    function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
    function mk(){return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.3,a:Math.random(),da:(Math.random()*.004+.001)*(Math.random()<.5?1:-1),speed:Math.random()*.03+.005};}
    function draw(){
        ctx.clearRect(0,0,W,H);
        st.forEach(s=>{
            s.a=Math.max(.05,Math.min(.95,s.a+s.da));
            if(s.a<=.05||s.a>=.95)s.da*=-1;
            s.y-=s.speed;if(s.y<0){s.y=H;s.x=Math.random()*W;}
            ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
            ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    addEventListener('resize',()=>{resize();st=Array.from({length:90},mk);});
    resize();st=Array.from({length:90},mk);draw();
})();

/* ── Sayaç ── */
const START=new Date("2026-04-28T00:00:00");
const BDAY_M=7,BDAY_D=10;
function isBday(){const n=new Date();return n.getMonth()+1===BDAY_M&&n.getDate()===BDAY_D;}
function isBdayWeek(){const n=new Date(),bd=new Date(n.getFullYear(),BDAY_M-1,BDAY_D),diff=bd-n;return diff>0&&diff<=7*86400000;}
function nextBday(){const n=new Date();let y=n.getFullYear();let bd=new Date(y,BDAY_M-1,BDAY_D);if(bd<=n)bd=new Date(y+1,BDAY_M-1,BDAY_D);return bd;}
function pad(v){return String(v).padStart(2,'0');}
function setBdayMode(on){['tb-d','tb-h','tb-m','tb-s'].forEach(id=>document.getElementById(id).classList.toggle('bday',on));document.getElementById('tlabel').classList.toggle('bday',on);}
function tick(){
    const n=new Date();
    if(isBday()){
        document.getElementById('tlabel').textContent='🎂 Doğum Günün Kutlu Olsun!';setBdayMode(true);
        document.getElementById('bday-banner').style.display='block';document.getElementById('bdayBtn').style.display='block';
        ['td','th','tm','ts'].forEach((id,i)=>document.getElementById(id).textContent=['🎂','🎉','💙','✨'][i]);
        ['tl-d','tl-h','tl-m','tl-s'].forEach(id=>document.getElementById(id).textContent='');return;
    }
    if(isBdayWeek()){
        document.getElementById('tlabel').textContent='🎂 Doğum Gününe Kalan';setBdayMode(true);
        document.getElementById('bdayBtn').style.display='block';
        const diff=nextBday()-n,d=Math.floor(diff/86400000),h=Math.floor((diff/3600000)%24),m=Math.floor((diff/60000)%60),s=Math.floor((diff/1000)%60);
        document.getElementById('td').textContent=pad(d);document.getElementById('th').textContent=pad(h);
        document.getElementById('tm').textContent=pad(m);document.getElementById('ts').textContent=pad(s);
        ['tl-d','tl-h','tl-m','tl-s'].forEach((id,i)=>document.getElementById(id).textContent=['Gün','Saat','Dk','Sn'][i]);return;
    }
    setBdayMode(false);document.getElementById('tlabel').textContent='Birlikteliğimiz';
    const diff=n-START;if(diff<0)return;
    document.getElementById('td').textContent=pad(Math.floor(diff/86400000));
    document.getElementById('th').textContent=pad(Math.floor((diff/3600000)%24));
    document.getElementById('tm').textContent=pad(Math.floor((diff/60000)%60));
    document.getElementById('ts').textContent=pad(Math.floor((diff/1000)%60));
    ['tl-d','tl-h','tl-m','tl-s'].forEach((id,i)=>document.getElementById(id).textContent=['Gün','Saat','Dk','Sn'][i]);
}
setInterval(tick,1000);tick();

/* ──── MÜZİK SİSTEMİ ──── */
var ytTag=document.createElement('script');
ytTag.src='https://www.youtube.com/iframe_api';
document.head.appendChild(ytTag);

var ytPlayer,ytReady=false,pendingPlay=false,isPlaying=false;

window.onYouTubeIframeAPIReady=function(){
    ytPlayer=new YT.Player('yt-player',{
        videoId:'Fi15jicjMLc',
        playerVars:{autoplay:0,controls:0,loop:1,playlist:'Fi15jicjMLc',rel:0,disablekb:1},
        events:{
            onReady:function(e){
                ytReady=true;
                e.target.setVolume(38);
                const data=e.target.getVideoData();
                if(data&&data.title) document.getElementById('m-name').textContent=data.title;
                if(pendingPlay){e.target.playVideo();pendingPlay=false;}
            },
            onStateChange:function(e){
                isPlaying=(e.data===1);
                updateMusicUI();
            },
            onError:function(){
                // Video oynatılamıyorsa çubuğu gizle
                document.getElementById('music-bar').style.display='none';
            }
        }
    });
};

function startMusic(){
    hideMusicModal();
    if(ytReady){ytPlayer.playVideo();}else{pendingPlay=true;}
    document.getElementById('music-bar').style.display='flex';
}
function skipMusic(){hideMusicModal();}

function toggleMusic(){
    if(!ytPlayer||!ytReady)return;
    const state=ytPlayer.getPlayerState();
    if(state===1){ytPlayer.pauseVideo();}else{ytPlayer.playVideo();}
}

function updateMusicUI(){
    document.getElementById('m-toggle').textContent=isPlaying?'⏸':'▶';
    document.getElementById('m-status').textContent=isPlaying?'Çalıyor':'Duraklatıldı';
    document.getElementById('m-vinyl-sm').classList.toggle('paused',!isPlaying);
}

function hideMusicModal(){
    const m=document.getElementById('music-modal');
    m.querySelector('.m-box').style.opacity='0';
    m.querySelector('.m-box').style.transform='translateY(20px) scale(.97)';
    setTimeout(()=>{m.classList.remove('active');},500);
}

// Sayfa yüklendikten 1.2s sonra müzik modalını göster
setTimeout(()=>{
    const m=document.getElementById('music-modal');
    m.classList.add('active');
},1200);
</script>
</body>
</html>
