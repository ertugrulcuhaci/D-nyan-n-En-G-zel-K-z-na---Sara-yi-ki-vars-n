<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sana Bir Sorum Var 🥺</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;0,600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
    :root {
        --ink:#0A1628; --deep:#112240; --azure:#2D6FBD;
        --sky:#6BB8E8; --mist:#C8E8F8; --parchment:#EBF5FD;
        --ember:#FF6B8A; --honey:#F5C957;
        --frost:rgba(255,255,255,.07); --rim:rgba(255,255,255,.13);
    }
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }

    body {
        font-family: 'Poppins', sans-serif;
        background: var(--ink); color: var(--parchment);
        min-height: 100vh; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        overflow: hidden; position: relative;
        padding: 20px;
        transition: background 1.8s ease;
    }
    body.answered {
        background: radial-gradient(ellipse at top, #1a2f5a, #0A1628 70%);
    }

    canvas#cv { position: fixed; inset:0; z-index:0; pointer-events:none; }

    /* Merkez kutu */
    .wrap {
        position: relative; z-index: 10;
        background: var(--frost); border: 1px solid var(--rim);
        border-radius: 28px; padding: 50px 40px 44px;
        max-width: 88%; width: 420px; text-align: center;
        backdrop-filter: blur(22px);
        box-shadow: 0 30px 70px rgba(0,0,0,.55);
        animation: riseUp .9s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes riseUp { from{ opacity:0; transform:translateY(28px) scale(.97); } to{ opacity:1; transform:translateY(0) scale(1); } }

    .q-icon { font-size: 52px; margin-bottom: 20px; display: block; animation: heartbeat 2.2s ease-in-out infinite; }
    @keyframes heartbeat { 0%,100%{ transform:scale(1); } 14%{ transform:scale(1.15); } 28%{ transform:scale(1); } 42%{ transform:scale(1.08); } 56%{ transform:scale(1); } }

    h1 {
        font-family: 'Cormorant Garamond', serif;
        font-size: clamp(24px,6vw,34px); font-style: italic; font-weight: 600;
        color: var(--mist); line-height: 1.2; margin-bottom: 36px;
    }

    .btn-row { display: flex; gap: 16px; justify-content: center; align-items: center; min-height: 58px; }

    .btn-yes {
        padding: 14px 36px; font-size: 16px; font-weight: 600;
        font-family: 'Poppins', sans-serif; border: none; border-radius: 50px;
        cursor: pointer; color: #fff;
        background: linear-gradient(135deg, #2fb57a, #58d6a0);
        box-shadow: 0 8px 24px rgba(47,181,122,.4);
        transition: transform .18s, box-shadow .18s;
        white-space: nowrap;
    }
    .btn-yes:hover { transform: scale(1.08); box-shadow: 0 12px 30px rgba(47,181,122,.5); }
    .btn-yes:active { transform: scale(.97); }

    #no-btn {
        padding: 14px 28px; font-size: 16px; font-weight: 600;
        font-family: 'Poppins', sans-serif; border: none; border-radius: 50px;
        cursor: pointer; color: #fff;
        background: linear-gradient(135deg, #e25c53, #f2867e);
        box-shadow: 0 8px 24px rgba(226,92,83,.35);
        position: fixed; /* Anlık ışınlanma için fixed */
        white-space: nowrap; z-index: 20;
        transition: box-shadow .2s;
    }

    /* Cevap ekranı */
    #answer-screen {
        display: none;
        position: relative; z-index: 10;
        background: var(--frost); border: 1px solid rgba(107,184,232,.25);
        border-radius: 28px; padding: 48px 38px 44px; text-align: center;
        max-width: 88%; width: 420px;
        backdrop-filter: blur(22px);
        box-shadow: 0 30px 70px rgba(0,0,0,.55);
        animation: riseUp .7s cubic-bezier(.16,1,.3,1) both;
    }
    .answer-icon { font-size: 56px; margin-bottom: 18px; display: block; }
    .answer-text {
        font-family: 'Cormorant Garamond', serif;
        font-size: clamp(20px,5vw,28px); font-style: italic;
        color: var(--mist); line-height: 1.45; margin-bottom: 28px;
    }
    .btn-home {
        display: inline-block; padding: 12px 30px; border: none; border-radius: 30px;
        font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 600;
        cursor: pointer; color: #fff; background: linear-gradient(135deg, var(--azure), var(--sky));
        box-shadow: 0 8px 22px rgba(45,111,189,.4); transition: .2s;
    }
    .btn-home:hover { transform: scale(1.05); }

    /* Yağan semboller */
    .fall { position: fixed; pointer-events: none; z-index: 15; animation: fall linear forwards; font-size: 18px; }
    @keyframes fall { to { transform: translateY(110vh); opacity: 0; } }

    @media (prefers-reduced-motion: reduce) { .q-icon, .wrap { animation: none; } .wrap { opacity:1; } }
</style>
</head>
<body>
<canvas id="cv"></canvas>

<!-- Soru ekranı -->
<div class="wrap" id="q-screen">
    <span class="q-icon">🥺</span>
    <h1>Beni seviyor musun?</h1>
    <div class="btn-row">
        <button class="btn-yes" onclick="sayYes()">Evet ❤️</button>
        <button id="no-btn">Hayır 💔</button>
    </div>
</div>

<!-- Cevap ekranı -->
<div id="answer-screen">
    <span class="answer-icon">😍</span>
    <p class="answer-text">Ben de seni çok seviyorum...<br>Her gün biraz daha fazla. 💙</p>
    <button class="btn-home" onclick="location.href='index.html'">Ana Sayfaya Dön</button>
</div>

<script>
/* Canvas stars */
(function(){
    const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
    let W,H,st=[];
    function resize(){ W=cv.width=innerWidth; H=cv.height=innerHeight; }
    function mk(){ return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+.3,a:Math.random(),da:(Math.random()*.005+.001)*(Math.random()<.5?1:-1)}; }
    function draw(){
        ctx.clearRect(0,0,W,H);
        st.forEach(s=>{
            s.a=Math.max(.05,Math.min(.9,s.a+s.da));
            if(s.a<=.05||s.a>=.9)s.da*=-1;
            ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
            ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    addEventListener('resize',()=>{resize();st=Array.from({length:80},mk);});
    resize();st=Array.from({length:80},mk);draw();
})();

/* No button escape */
const noBtn = document.getElementById('no-btn');
let bW=0, bH=0;

window.addEventListener('load',()=>{
    bW = noBtn.offsetWidth; bH = noBtn.offsetHeight;
    // Başlangıç: evet butonunun sağına hizala
    const yes = document.querySelector('.btn-yes');
    const r = yes.getBoundingClientRect();
    noBtn.style.left = (r.right + 20) + 'px';
    noBtn.style.top  = r.top + 'px';
});

function escape(e) {
    if(e && e.cancelable) e.preventDefault();
    bW = noBtn.offsetWidth  || 130;
    bH = noBtn.offsetHeight || 52;
    const maxX = innerWidth  - bW  - 16;
    const maxY = innerHeight - bH  - 16;
    noBtn.style.left = Math.max(16, Math.random() * maxX) + 'px';
    noBtn.style.top  = Math.max(16, Math.random() * maxY) + 'px';
}

noBtn.addEventListener('mouseover', escape);
noBtn.addEventListener('touchstart', escape, { passive:false });
addEventListener('resize', () => { if(noBtn.style.position==='fixed') escape(); });

/* Cevap */
function sayYes(){
    document.body.classList.add('answered');
    document.getElementById('q-screen').style.display = 'none';
    noBtn.style.display = 'none';
    document.getElementById('answer-screen').style.display = 'block';
    rain(['❤️','💙','⭐','✨','💫','🌟','💕'], 70);
}

function rain(symbols, count){
    for(let i=0; i<count; i++){
        const el = document.createElement('div');
        el.className = 'fall';
        el.textContent = symbols[Math.floor(Math.random()*symbols.length)];
        el.style.left = (Math.random()*100) + 'vw';
        el.style.top  = '-40px';
        el.style.fontSize = (Math.random()*14+10) + 'px';
        const dur = (Math.random()*3+2.5).toFixed(2);
        el.style.animationDuration = dur + 's';
        el.style.animationDelay    = (Math.random()*2).toFixed(2) + 's';
        document.body.appendChild(el);
        setTimeout(()=>el.remove(), (parseFloat(dur)+2.5)*1000);
    }
}
</script>
</body>
</html>
