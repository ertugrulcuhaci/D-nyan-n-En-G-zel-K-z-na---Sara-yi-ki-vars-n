<!DOCTYPE html>
<html lang="tr">
<head>
    <style>
        body { background: #0f2027; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        .box { text-align: center; }
        .btn-yes { padding: 15px 40px; background: #81d4fa; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-no { padding: 15px 40px; background: transparent; border: 1px solid white; color: white; border-radius: 30px; cursor: pointer; position: absolute; }
    </style>
</head>
<body>
    <div class="box" id="main">
        <h1>Benimle bir ömür geçirmeye var mısın?</h1>
        <button class="btn-yes" onclick="showLove()">Evet! ❤️</button>
        <button class="btn-no" id="noBtn" onmouseover="moveNo()">Hayır</button>
    </div>

    <script>
        function moveNo() {
            const btn = document.getElementById('noBtn');
            btn.style.left = Math.random() * 80 + '%';
            btn.style.top = Math.random() * 80 + '%';
        }
        function showLove() {
            document.getElementById('main').innerHTML = "<h1>Biliyordum! Seni seviyorum Sara! 💙</h1>";
        }
    </script>
</body>
</html>
