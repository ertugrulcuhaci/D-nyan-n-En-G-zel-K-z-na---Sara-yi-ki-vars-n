<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doğum Günü Kazı Kazan 🎟️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink:      #0A1628;
            --deep:     #112240;
            --sky:      #6BB8E8;
            --mist:     #C8E8F8;
            --parchment:#EBF5FD;
            --ember:    #FF6B8A;
            --honey:    #F5C957;
            --frost:    rgba(255,255,255,0.06);
            --rim:      rgba(255,255,255,0.13);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif; background: var(--ink); color: var(--parchment);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; padding: 30px 20px; position: relative;
        }

        #bg-stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        .header { text-align: center; margin-bottom: 30px; position: relative; z-index: 10; }
        .header h1 { 
            font-family: 'Cormorant Garamond', serif; font-size: 32px; font-style: italic; 
            color: var(--honey); margin-bottom: 5px; text-shadow: 0 0 20px rgba(245,201,87,0.4);
        }
        .header p { font-size: 13px; color: var(--mist); opacity: 0.8; }

        .scratch-container {
            display: flex; flex-direction: column; gap: 25px; width: 100%; max-width: 350px; z-index: 10;
        }

        .scratch-card {
            position: relative; width: 100%; height: 160px; border-radius: 20px;
            overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, rgba(255,107,138,0.2), rgba(107,184,232,0.2));
            border: 1px solid var(--ember);
            display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px;
        }

        /* Kazanılan Ödülün Görünümü (Altta Kalan Katman) */
        .prize {
            font-family: 'Poppins', sans-serif; font-size: 16px; font-weight: 500;
            color: var(--parchment); line-height: 1.4;
        }
        .prize span { display: block; font-size: 28px; margin-bottom: 5px; }

        /* Kazınacak Yüzey (Üstte Kalan Katman) */
        canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            cursor: pointer; touch-action: none; /* Mobilde sayfayı kaydırmayı engeller */
        }

        .back-btn { 
            margin-top: 40px; padding: 12px 30px; border-radius: 50px; 
            background: var(--frost); border: 1px solid var(--rim); 
            color: #fff; text-decoration: none; font-size: 13px; transition: 0.2s; z-index: 10;
        }
        .back-btn:hover { background: rgba(255,255,255,0.15); }

    </style>
</head>
<body>

<canvas id="bg-stars"></canvas>

<div class="header">
    <h1>Doğum Gününe Özel! 🎁</h1>
    <p>Hediyeni görmek için parmağınla kartları kazı sevgilim...</p>
</div>

<div class="scratch-container">
    <!-- 1. Kart -->
    <div class="scratch-card" id="card1">
        <div class="prize"><span>🥺</span> 1 Saatlik Şartsız Şurtsuz<br>Mızmızlık Çekme Hakkı</div>
        <canvas id="canvas1"></canvas>
    </div>
    
    <!-- 2. Kart -->
    <div class="scratch-card" id="card2">
        <div class="prize"><span>🍷</span> İstediğin Herhangi Bir Mekanda<br>Romantik Akşam Yemeği</div>
        <canvas id="canvas2"></canvas>
    </div>
    
    <!-- 3. Kart -->
    <div class="scratch-card" id="card3">
        <div class="prize"><span>💆‍♀️</span> Limitsiz Ertuğrul Sarılması<br>& Omuz Masajı</div>
        <canvas id="canvas3"></canvas>
    </div>
</div>

<a href="index.html" class="back-btn">⬅️ Ana Sayfaya Dön</a>

<script>
/* ── Güvenlik Kontrolü ── */
(function(){
  const ts = localStorage.getItem('sara_giris');
  const EIGHT_HOURS = 8 * 60 * 60 * 1000;
  if((!ts || (Date.now() - parseInt(ts)) > EIGHT_HOURS) && !location.search.includes('dev')){
    location.replace('giris.html');
  }
})();

/* ── Arka Plan Yıldızları ── */
(function () {
    const cv = document.getElementById('bg-stars'); const ctx = cv.getContext('2d');
    let W, H, stars = [];
    function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
    function mkStar() { return { x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.1 + .2, a: Math.random(), da: (Math.random() * .003 + .001) * (Math.random() < .5 ? 1 : -1) }; }
    function init() { resize(); stars = Array.from({ length: 40 }, mkStar); }
    function draw() {
        ctx.clearRect(0, 0, W, H);
        stars.forEach(s => {
            s.a = Math.max(.05, Math.min(.95, s.a + s.da)); if (s.a <= .05 || s.a >= .95) s.da *= -1;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fillStyle = `rgba(255,255,255,${s.a})`; ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    addEventListener('resize', () => { resize(); stars = Array.from({ length: 40 }, mkStar); });
    init(); draw();
})();

/* ── Kazı Kazan Mantığı ── */
function initScratchCard(canvasId) {
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let isDrawing = false;
    let isCleared = false; // Zaten temizlendiyse tekrar işlem yapmasın

    // Canvas boyutlarını container'a uydur
    canvas.width = canvas.parentElement.offsetWidth;
    canvas.height = canvas.parentElement.offsetHeight;

    // Üst katmanı (Kazınacak yüzeyi) boya
    const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
    gradient.addColorStop(0, "#C8E8F8");
    gradient.addColorStop(0.5, "#93A5CF");
    gradient.addColorStop(1, "#E4EFE9");
    
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Üstüne desen veya yazı ekle
    ctx.fillStyle = '#112240';
    ctx.font = 'bold 18px Poppins';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🎁 KAZIMAK İÇİN DOKUN', canvas.width / 2, canvas.height / 2);

    // Fare veya parmak pozisyonunu al
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function scratch(e) {
        if (!isDrawing || isCleared) return;
        e.preventDefault(); // Mobilde kaydırmayı engeller
        const pos = getPos(e);

        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, 25, 0, Math.PI * 2); // Kazıma fırçası boyutu
        ctx.fill();
    }

    function checkClearPercentage() {
        if (isCleared) return;
        const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let transparent = 0;
        
        // 4. değer (alpha) 0 olan pikselleri say
        for (let i = 3; i < pixels.length; i += 4) {
            if (pixels[i] === 0) transparent++;
        }
        
        const totalPixels = pixels.length / 4;
        const percentage = (transparent / totalPixels) * 100;

        // %45'i kazındıysa kartı tamamen aç
        if (percentage > 45) {
            isCleared = true;
            canvas.style.transition = 'opacity 0.6s ease';
            canvas.style.opacity = '0';
            setTimeout(() => { canvas.style.display = 'none'; }, 600);
        }
    }

    // Fare Olayları
    canvas.addEventListener('mousedown', (e) => { isDrawing = true; scratch(e); });
    canvas.addEventListener('mousemove', scratch);
    canvas.addEventListener('mouseup', () => { isDrawing = false; checkClearPercentage(); });
    canvas.addEventListener('mouseleave', () => { isDrawing = false; checkClearPercentage(); });

    // Dokunmatik Ekran Olayları
    canvas.addEventListener('touchstart', (e) => { isDrawing = true; scratch(e); });
    canvas.addEventListener('touchmove', scratch);
    canvas.addEventListener('touchend', () => { isDrawing = false; checkClearPercentage(); });
}

// Tüm kartları başlat (Biraz bekle ki CSS genişlikleri tam otursun)
window.onload = () => {
    setTimeout(() => {
        initScratchCard('canvas1');
        initScratchCard('canvas2');
        initScratchCard('canvas3');
    }, 100);
};
</script>

<!-- 💖 MOUSE EFEKTİ STİLLERİ 💖 -->
<style>
    /* 1. Fare İmlecini Kalp Yapma */
    body {
        /* İmleci pembe bir kalp SVG'si ile değiştirir (12 12 imlecin merkez noktasıdır) */
        cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path fill='%23FF6B8A' d='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'/></svg>") 12 12, auto;
    }

    /* Butonlar ve linkler üzerine gelindiğinde de imleç kalp kalsın ama parlasın */
    a, button, .flipper, canvas, input, textarea {
        cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path fill='%23F5C957' d='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'/></svg>") 12 12, pointer !important;
    }

    /* 2. Uçuşan Kalplerin Tasarımı */
    .magic-heart {
        position: fixed;
        pointer-events: none; /* Kalplerin tıklamayı engellememesi için çok önemli */
        z-index: 9999;
        font-size: 16px;
        animation: floatAndFade 1s ease-out forwards;
        transform: translate(-50%, -50%); /* Tam farenin ucundan çıkması için */
    }

    /* Kalplerin yukarı doğru uçup kaybolma animasyonu */
    @keyframes floatAndFade {
        0% { 
            transform: translate(-50%, -50%) scale(0.5); 
            opacity: 1; 
        }
        100% { 
            transform: translate(-50%, -150px) scale(1.5); 
            opacity: 0; 
        }
    }
</style>

<!-- 💖 MOUSE EFEKTİ JAVASCRIPT'İ 💖 -->
<script>
(function() {
    // Ekranda çıkacak kalp çeşitleri (istediğin emojiyi ekleyebilirsin)
    const hearts = ["💖", "✨", "💕", "🌸", "💘"];
    
    // Farenin her hareketini dinle
    document.addEventListener('mousemove', function(e) {
        // Çok fazla kalp çıkıp ekranı dondurmasın diye %80 ihtimalle boş geçiyoruz
        if (Math.random() > 0.15) return;

        // Yeni bir kalp elementi oluştur
        const heartEl = document.createElement('div');
        heartEl.className = 'magic-heart';
        
        // Rastgele bir kalp emojisi seç
        heartEl.innerText = hearts[Math.floor(Math.random() * hearts.length)];
        
        // Kalbin çıkacağı konumu farenin konumuna ayarla
        heartEl.style.left = e.clientX + 'px';
        heartEl.style.top = e.clientY + 'px';
        
        // Biraz rastgelelik katalım (hafif sağa veya sola doğru uçsunlar)
        const randomX = (Math.random() - 0.5) * 50; 
        heartEl.style.setProperty('--tx', `${randomX}px`);

        // Elementi sayfaya ekle
        document.body.appendChild(heartEl);
        
        // Animasyon bitince (1 saniye sonra) elementi DOM'dan sil (kasmasını engeller)
        setTimeout(() => {
            heartEl.remove();
        }, 1000);
    });
})();
</script>

</body>
</html>
