<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emine Sara'm 🔒</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0A1628;--deep:#112240;--azure:#2D6FBD;--sky:#6BB8E8;--mist:#C8E8F8;
  --parchment:#EBF5FD;--ember:#FF6B8A;--honey:#F5C957;
  --frost:rgba(255,255,255,.07);--rim:rgba(255,255,255,.14);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Poppins',sans-serif;background:var(--ink);color:var(--parchment);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;position:relative;padding:20px;
}

#cv{position:fixed;inset:0;z-index:0;pointer-events:none;}
.shoot{position:fixed;width:2px;height:2px;background:#fff;border-radius:50%;
  box-shadow:0 0 6px 2px rgba(255,255,255,.8);opacity:0;z-index:1;pointer-events:none;
  animation:shoot linear infinite;}
.shoot:nth-child(1){top:6%;left:-5%;animation-duration:7s;animation-delay:1s;}
.shoot:nth-child(2){top:22%;left:-5%;animation-duration:9s;animation-delay:5s;}
.shoot:nth-child(3){top:55%;left:-5%;animation-duration:6s;animation-delay:12s;}
@keyframes shoot{0%{transform:translate(0,0);opacity:0;}4%{opacity:1;}22%{transform:translate(70vw,28vh);opacity:0;}100%{opacity:0;}}

.float-heart{position:fixed;font-size:14px;z-index:1;pointer-events:none;opacity:0;animation:floatUp linear infinite;}
@keyframes floatUp{0%{transform:translateY(0) rotate(-8deg);opacity:0;}10%{opacity:.4;}90%{opacity:.15;}100%{transform:translateY(-110vh) rotate(8deg);opacity:0;}}

.card{
  position:relative;z-index:10;
  background:var(--frost);border:1px solid var(--rim);border-radius:30px;
  padding:52px 44px 48px;max-width:92%;width:460px;text-align:center;
  backdrop-filter:blur(28px);
  box-shadow:0 40px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04),inset 0 1px 0 rgba(255,255,255,.1);
  animation:riseUp .9s cubic-bezier(.16,1,.3,1) both;
}
@keyframes riseUp{from{opacity:0;transform:translateY(36px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}

.lock-wrap{
  width:72px;height:72px;margin:0 auto 28px;border-radius:50%;
  background:linear-gradient(135deg,rgba(45,111,189,.35),rgba(107,184,232,.2));
  border:1px solid rgba(107,184,232,.25);
  display:flex;align-items:center;justify-content:center;font-size:32px;
  box-shadow:0 8px 28px rgba(45,111,189,.25),inset 0 1px 0 rgba(255,255,255,.08);
  transition:all .5s cubic-bezier(.16,1,.3,1);
}
.lock-wrap.unlocked{
  background:linear-gradient(135deg,rgba(47,181,122,.3),rgba(88,214,160,.2));
  border-color:rgba(47,181,122,.4);
  box-shadow:0 8px 36px rgba(47,181,122,.35),inset 0 1px 0 rgba(255,255,255,.08);
  animation:unlockPop .6s cubic-bezier(.16,1,.3,1);
}
@keyframes unlockPop{0%{transform:scale(1);}40%{transform:scale(1.25);}70%{transform:scale(.95);}100%{transform:scale(1);}}

.eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(107,184,232,.45);margin-bottom:12px;}
h1{
  font-family:'Cormorant Garamond',serif;font-size:clamp(26px,6vw,38px);font-style:italic;font-weight:600;
  background:linear-gradient(135deg,var(--honey),var(--sky));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin-bottom:6px;line-height:1.2;
}
.hint{font-size:13px;font-weight:300;color:rgba(200,232,248,.5);margin-bottom:32px;line-height:1.6;}
.hint span{color:rgba(255,107,138,.7);font-style:italic;}

.question-bubble{
  background:rgba(45,111,189,.12);border:1px solid rgba(107,184,232,.2);
  border-radius:16px;padding:14px 18px;margin-bottom:24px;
  font-size:14px;line-height:1.6;color:rgba(200,232,248,.85);font-style:italic;position:relative;
}
.question-bubble::before{content:'💬';position:absolute;top:-14px;left:20px;font-size:20px;}

.input-wrap{position:relative;margin-bottom:10px;}
.input-wrap input{
  width:100%;padding:16px 20px;
  background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.12);
  border-radius:50px;color:var(--parchment);font-family:'Poppins',sans-serif;
  font-size:14px;font-weight:400;outline:none;
  transition:border-color .25s,background .25s,box-shadow .25s;
  text-align:center;letter-spacing:.5px;
}
.input-wrap input::placeholder{color:rgba(200,232,248,.3);}
.input-wrap input:focus{border-color:rgba(107,184,232,.5);background:rgba(107,184,232,.07);box-shadow:0 0 0 3px rgba(107,184,232,.12);}
.input-wrap input.error{border-color:rgba(255,107,138,.5);background:rgba(255,107,138,.06);animation:shake .4s ease;}
.input-wrap input.success{border-color:rgba(47,181,122,.5);background:rgba(47,181,122,.07);}

.enter-btn{
  width:100%;padding:15px 20px;border:none;border-radius:50px;margin-top:14px;
  font-family:'Poppins',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;color:#fff;letter-spacing:.3px;
  background:linear-gradient(135deg,var(--azure),var(--sky));
  box-shadow:0 8px 28px rgba(45,111,189,.4);
  transition:transform .2s,box-shadow .2s,filter .2s;
}
.enter-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 12px 34px rgba(107,184,232,.45);}
.enter-btn:active{transform:scale(.98);}

.msg{font-size:12px;min-height:18px;margin-top:10px;transition:opacity .3s;text-align:center;color:rgba(255,107,138,.8);}
.msg.hint-msg{color:rgba(200,232,248,.45);}
.msg.success-msg{color:rgba(47,181,122,.8);}

.try-dots{display:flex;justify-content:center;gap:7px;margin:16px 0 0;}
.tdot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.12);transition:.3s;}
.tdot.used{background:rgba(255,107,138,.5);}
.tdot.hint-pulse{background:rgba(245,201,87,.6);animation:dotPulse .8s ease-in-out infinite alternate;}
@keyframes dotPulse{from{transform:scale(1);}to{transform:scale(1.5);}}
.signature{margin-top:28px;font-size:10px;font-weight:300;color:rgba(200,232,248,.2);letter-spacing:2px;}

.success-overlay{
  position:fixed;inset:0;z-index:200;background:var(--ink);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .6s ease;
}
.success-overlay.show{opacity:1;pointer-events:auto;}
.success-overlay .so-text{
  font-family:'Cormorant Garamond',serif;font-size:clamp(26px,6vw,40px);font-style:italic;
  color:var(--mist);text-align:center;line-height:1.5;
  opacity:0;transform:scale(.9);transition:opacity .6s ease .3s,transform .6s cubic-bezier(.16,1,.3,1) .3s;
}
.success-overlay.show .so-text{opacity:1;transform:scale(1);}

@keyframes shake{0%,100%{transform:translateX(0);}15%{transform:translateX(-8px);}35%{transform:translateX(8px);}55%{transform:translateX(-5px);}75%{transform:translateX(5px);}90%{transform:translateX(-2px);}}
.piece{position:fixed;top:-20px;z-index:250;pointer-events:none;border-radius:2px;animation:pfall linear forwards;}
@keyframes pfall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}

@media(max-width:400px){.card{padding:40px 28px 36px;}}
@media(prefers-reduced-motion:reduce){.card,.shoot,.float-heart{animation:none;}.card{opacity:1;}}
</style>
</head>
<body>

<canvas id="cv"></canvas>
<div class="shoot"></div>
<div class="shoot"></div>
<div class="shoot"></div>

<div class="success-overlay" id="soOverlay">
  <p class="so-text" id="soText">Hoş geldin Sara...<br>💙</p>
</div>

<div class="card" id="mainCard">
  <div class="lock-wrap" id="lockIcon">🔒</div>
  <p class="eyebrow">Sadece senin için</p>
  <h1>Emine Sara'm</h1>
  <p class="hint">Oraya girebilmek için<br>küçük bir <span>sınavı</span> geçmen gerekiyor 🥺</p>

  <div class="question-bubble">Çıkma tarihimiz ne, prenses? 💌</div>

  <div class="input-wrap">
    <input type="text" id="pwInput" placeholder="cevabını yaz..." autocomplete="off" autocorrect="off" spellcheck="false">
  </div>

  <p class="msg" id="msgEl">&nbsp;</p>

  <div class="try-dots" id="tryDots">
    <div class="tdot" id="d0"></div>
    <div class="tdot" id="d1"></div>
    <div class="tdot" id="d2"></div>
  </div>

  <button class="enter-btn" onclick="checkPw()">Giriş Yap ✨</button>
  <p class="signature">with love · always</p>
</div>

<script>
(function(){
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  let W,H,st=[];
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  function mk(){return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.3,a:Math.random(),da:(Math.random()*.005+.001)*(Math.random()<.5?1:-1),vy:Math.random()*.02+.005};}
  function draw(){
    ctx.clearRect(0,0,W,H);
    st.forEach(s=>{
      s.a=Math.max(.05,Math.min(.92,s.a+s.da));
      if(s.a<=.05||s.a>=.92)s.da*=-1;
      s.y-=s.vy;if(s.y<0){s.y=H;s.x=Math.random()*W;}
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  addEventListener('resize',()=>{resize();st=Array.from({length:100},mk);});
  resize();st=Array.from({length:100},mk);draw();
})();

(function(){
  const symbols=['❤️','💙','✨','⭐','💫'];
  function spawnHeart(){
    const el=document.createElement('div');
    el.className='float-heart';
    el.textContent=symbols[Math.floor(Math.random()*symbols.length)];
    el.style.left=Math.random()*100+'vw';
    el.style.bottom='-30px';
    const dur=(Math.random()*12+10).toFixed(1);
    el.style.animationDuration=dur+'s';
    el.style.animationDelay=(Math.random()*2).toFixed(1)+'s';
    el.style.fontSize=(Math.random()*8+10)+'px';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),(parseFloat(dur)+3)*1000);
  }
  for(let i=0;i<8;i++) setTimeout(spawnHeart,i*1500);
  setInterval(spawnHeart,2000);
})();

const ANSWERS=['28 nisan 2026','28nisan2026','nisan 28 2026','28.04.2026','28/04/2026','28-04-2026','04/28/2026','28 04 2026','28042026','28 nisan','nisan 28','28 nisan 2026.','28.nisan.2026','28 nisan, 2026','28/4/2026','28.4.2026'];
const WRONG_MSGS=['Hmm... Yanlış gibi, düşün biraz 🤔','Bu sefer de değil... İpucu: çıkma tarihi 😅','Son hakkın! Çok düşünme, bunu biliyorsun 💙'];
const HINT_MSGS=['','İpucu: sadece gün ve ay yeterli bile 😉','İpucu: "28 nisan" yazmayı dene 🥺'];

let tries=0;
const MAX=3;
const input=document.getElementById('pwInput');
const msgEl=document.getElementById('msgEl');

function normalize(s){return s.toLowerCase().replace(/İ/g,'i').replace(/Ş/g,'ş').replace(/Ğ/g,'ğ').replace(/Ç/g,'ç').replace(/Ü/g,'ü').replace(/Ö/g,'ö').trim().replace(/\s+/g,' ');}

function checkPw(){
  const val=normalize(input.value);
  if(!val){shake();return;}

  const ok=ANSWERS.some(a=>val===normalize(a)) || val.includes('28 nisan') || val.includes('nisan 28') || val.includes('28.04') || val.includes('28/04');

  if(ok){
    input.classList.add('success');
    document.getElementById('lockIcon').textContent='💚';
    document.getElementById('lockIcon').classList.add('unlocked');
    msgEl.className='msg success-msg';
    msgEl.textContent='Doğru! Hoş geldin prenses... 🌟';
    burst(40);
    localStorage.setItem('sara_giris', Date.now().toString());
    
    setTimeout(()=>{
      const ov=document.getElementById('soOverlay');
      ov.classList.add('show');
      burst(80);
      // Doğru girişten sonra doğrudan index.html ana sayfasına yönlendiriyor
      setTimeout(()=>{ window.location.href='index.html'; },2200);
    },1200);
    return;
  }

  tries++;
  updateDots();
  input.classList.add('error');
  setTimeout(()=>input.classList.remove('error'),500);

  msgEl.className='msg';
  if(tries>=MAX){
    msgEl.textContent='Bak, "28 nisan" dene yeter 😂 Biliyordun zaten!';
    input.value='';
    pulseDot(tries-1);
  } else {
    msgEl.textContent=WRONG_MSGS[tries-1];
    if(HINT_MSGS[tries]){
      setTimeout(()=>{
        if(msgEl.className.includes('success')) return;
        msgEl.className='msg hint-msg';
        msgEl.textContent=HINT_MSGS[tries];
      },2500);
    }
  }
  input.value='';
  input.focus();
}

function shake(){input.classList.add('error');setTimeout(()=>input.classList.remove('error'),400);}
function updateDots(){for(let i=0;i<MAX;i++){const d=document.getElementById('d'+i);if(i<tries) d.classList.add('used');}}
function pulseDot(i){const d=document.getElementById('d'+i);if(d) d.classList.add('hint-pulse');}

input.addEventListener('keydown',e=>{if(e.key==='Enter')checkPw();});
setTimeout(()=>input.focus(),800);

const COLS=['#FF6B8A','#F5C957','#6BB8E8','#fff','#FF9AC3','#B8E0FF','#FFE066'];
function burst(n){
  for(let i=0;i<n;i++){
    const el=document.createElement('div');
    el.className='piece';
    el.style.left=Math.random()*100+'vw';
    el.style.background=COLS[Math.floor(Math.random()*COLS.length)];
    const s=Math.random()*8+5;el.style.width=s+'px';el.style.height=s+'px';
    el.style.borderRadius=Math.random()>.5?'50%':'2px';
    const dur=(Math.random()*2+2).toFixed(2);
    el.style.animationDuration=dur+'s';
    el.style.animationDelay=(Math.random()*1.2).toFixed(2)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),(parseFloat(dur)+2)*1000);
  }
}
</script>

<!-- 💖 MOUSE EFEKTİ STİLLERİ 💖 -->
<style>
    /* 1. Fare İmlecini Kalp Yapma */
    body {
        /* İmleci pembe bir kalp SVG'si ile değiştirir (12 12 imlecin merkez noktasıdır) */
        cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path fill='%23FF6B8A' d='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'/></svg>") 12 12, auto;
    }

    /* Butonlar ve linkler üzerine gelindiğinde de imleç kalp kalsın ama parlasın */
    a, button, .flipper, canvas, input, textarea {
        cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path fill='%23F5C957' d='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'/></svg>") 12 12, pointer !important;
    }

    /* 2. Uçuşan Kalplerin Tasarımı */
    .magic-heart {
        position: fixed;
        pointer-events: none; /* Kalplerin tıklamayı engellememesi için çok önemli */
        z-index: 9999;
        font-size: 16px;
        animation: floatAndFade 1s ease-out forwards;
        transform: translate(-50%, -50%); /* Tam farenin ucundan çıkması için */
    }

    /* Kalplerin yukarı doğru uçup kaybolma animasyonu */
    @keyframes floatAndFade {
        0% { 
            transform: translate(-50%, -50%) scale(0.5); 
            opacity: 1; 
        }
        100% { 
            transform: translate(-50%, -150px) scale(1.5); 
            opacity: 0; 
        }
    }
</style>

<!-- 💖 MOUSE EFEKTİ JAVASCRIPT'İ 💖 -->
<script>
(function() {
    // Ekranda çıkacak kalp çeşitleri (istediğin emojiyi ekleyebilirsin)
    const hearts = ["💖", "✨", "💕", "🌸", "💘"];
    
    // Farenin her hareketini dinle
    document.addEventListener('mousemove', function(e) {
        // Çok fazla kalp çıkıp ekranı dondurmasın diye %80 ihtimalle boş geçiyoruz
        if (Math.random() > 0.15) return;

        // Yeni bir kalp elementi oluştur
        const heartEl = document.createElement('div');
        heartEl.className = 'magic-heart';
        
        // Rastgele bir kalp emojisi seç
        heartEl.innerText = hearts[Math.floor(Math.random() * hearts.length)];
        
        // Kalbin çıkacağı konumu farenin konumuna ayarla
        heartEl.style.left = e.clientX + 'px';
        heartEl.style.top = e.clientY + 'px';
        
        // Biraz rastgelelik katalım (hafif sağa veya sola doğru uçsunlar)
        const randomX = (Math.random() - 0.5) * 50; 
        heartEl.style.setProperty('--tx', `${randomX}px`);

        // Elementi sayfaya ekle
        document.body.appendChild(heartEl);
        
        // Animasyon bitince (1 saniye sonra) elementi DOM'dan sil (kasmasını engeller)
        setTimeout(() => {
            heartEl.remove();
        }, 1000);
    });
})();
</script>


</body>
</html>
