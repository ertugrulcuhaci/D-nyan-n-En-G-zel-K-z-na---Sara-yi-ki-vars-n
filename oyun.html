<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyun Odası 🎮</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    :root {
        --night-deep: #102844;
        --night-mid: #1B3F73;
        --blue-primary: #2C6FBD;
        --blue-light: #8ECDF0;
        --blue-pale: #EAF4FC;
        --gold: #F4C95D;
        --glass: rgba(255,255,255,0.06);
        --glass-border: rgba(255,255,255,0.16);
    }
    * { box-sizing: border-box; }
    body {
        margin: 0; font-family: 'Poppins', sans-serif; text-align: center;
        background: linear-gradient(160deg, var(--night-mid) 0%, var(--night-deep) 100%);
        color: var(--blue-pale); min-height: 100vh; position: relative; overflow-x: hidden;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        padding: 20px; box-sizing: border-box;
    }

    #stars { position: fixed; inset: 0; z-index: -2; pointer-events: none; }
    .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.2; animation: twinkle 3s ease-in-out infinite; }
    @keyframes twinkle { 0%, 100% { opacity: .12; } 50% { opacity: .8; } }

    h1 {
        font-family: 'Great Vibes', cursive; font-size: clamp(34px, 8vw, 50px);
        margin-bottom: 10px;
        background: linear-gradient(90deg, var(--gold), var(--blue-light));
        -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    p.subtitle { font-size: 15px; color: rgba(234,244,252,0.65); margin-bottom: 40px; }

    .game-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 1000px; }

    .game-card {
        background: var(--glass); border-radius: 20px; padding: 25px; width: 260px;
        backdrop-filter: blur(14px); border: 1px solid var(--glass-border);
        box-shadow: 0 15px 35px rgba(0,0,0,0.35), 0 0 25px rgba(44,111,189,0.12);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        display: flex; flex-direction: column; align-items: center; text-decoration: none; color: inherit;
        opacity: 0; animation: cardIn 0.6s ease forwards;
    }
    .game-card:nth-child(1) { animation-delay: .1s; }
    .game-card:nth-child(2) { animation-delay: .25s; }
    .game-card:nth-child(3) { animation-delay: .4s; }
    @keyframes cardIn { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }

    .game-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 25px 45px rgba(0,0,0,0.4), 0 0 35px rgba(44,111,189,0.3);
    }
    .game-icon { font-size: 50px; margin-bottom: 15px; }
    .game-card h3 { margin: 0 0 10px 0; color: var(--blue-light); font-size: 22px; }
    .game-card p { font-size: 14px; color: rgba(234,244,252,0.75); margin: 0 0 20px 0; line-height: 1.4; }

    .play-btn {
        padding: 10px 25px; font-size: 14px; font-weight: 600; font-family: 'Poppins', sans-serif;
        border: none; border-radius: 50px; cursor: pointer; color: white;
        background: linear-gradient(45deg, var(--blue-primary), var(--blue-light)); width: 100%; transition: 0.3s;
    }
    .game-card:hover .play-btn { box-shadow: 0 5px 18px rgba(142,205,240,0.5); }

    .back-btn {
        margin-top: 40px; padding: 10px 20px; background: transparent; border: 2px solid var(--blue-light);
        color: var(--blue-light); border-radius: 50px; font-family: 'Poppins', sans-serif; font-weight: 600;
        cursor: pointer; transition: 0.3s;
    }
    .back-btn:hover { background: var(--blue-light); color: var(--night-deep); }
    @media (prefers-reduced-motion: reduce) { .star, .game-card { animation: none; opacity: 1; } }
</style>
</head>
<body>
    <div id="stars"></div>

    <h1>Oyun Odamız</h1>
    <p class="subtitle">Birlikte eğlenmek için bir macera seç 💙</p>
    <div class="game-container">

        <a href="hafiza.html" class="game-card">
            <div class="game-icon">🧩</div>
            <h3>Anı Eşleştirme</h3>
            <p>En güzel fotoğraflarımızı hafızanda tutabilir misin?</p>
            <button class="play-btn">Oyna</button>
        </a>
        <a href="masal.html" class="game-card">
            <div class="game-icon">📖</div>
            <h3>Turluk Masalı</h3>
            <p>Kendi seçimlerinle hikayemizin gidişatını sen belirle.</p>
            <button class="play-btn">Oku & Seç</button>
        </a>
        <a href="kosu.html" class="game-card">
            <div class="game-icon">🏃‍♂️</div>
            <h3>Sonsuz Aşk Koşusu</h3>
            <p>Engelleri aş ve bana ulaşmak için kalpleri topla!</p>
            <button class="play-btn">Başla</button>
        </a>
    </div>
    <button class="back-btn" onclick="window.location.href='./index.html'">Geri Dön</button>

<script>
    (function(){
        const starsEl = document.getElementById('stars');
        for (let i = 0; i < 35; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 2 + 1;
            s.style.width = size + 'px';
            s.style.height = size + 'px';
            s.style.top = Math.random() * 100 + '%';
            s.style.left = Math.random() * 100 + '%';
            s.style.animationDelay = (Math.random() * 3) + 's';
            s.style.animationDuration = (2 + Math.random() * 3) + 's';
            starsEl.appendChild(s);
        }
    })();
</script>
</body>
</html>
