<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyun Odası 🎮</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0; font-family: 'Poppins', sans-serif; text-align: center;
        background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%), linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
        background-blend-mode: soft-light; color: #333; min-height: 100vh;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        padding: 20px; box-sizing: border-box;
    }

    h1 {
        font-family: 'Great Vibes', cursive; font-size: 50px; color: #d81b60;
        margin-bottom: 10px; text-shadow: 0 0 15px rgba(216, 27, 96, 0.1);
    }

    p.subtitle {
        font-size: 16px; color: #7d3c4a; margin-bottom: 40px;
    }

    .game-container {
        display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 1000px;
    }

    .game-card {
        background: rgba(255, 255, 255, 0.6);
        border-radius: 20px; padding: 25px; width: 260px;
        backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 15px 35px rgba(216, 27, 96, 0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        display: flex; flex-direction: column; align-items: center; text-decoration: none; color: inherit;
    }

    .game-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 25px 45px rgba(216, 27, 96, 0.2);
    }

    .game-icon {
        font-size: 50px; margin-bottom: 15px;
    }

    .game-card h3 {
        margin: 0 0 10px 0; color: #d81b60; font-size: 22px;
    }

    .game-card p {
        font-size: 14px; color: #555; margin: 0 0 20px 0; line-height: 1.4;
    }

    .play-btn {
        padding: 10px 25px; font-size: 14px; font-weight: 600; font-family: 'Poppins', sans-serif;
        border: none; border-radius: 50px; cursor: pointer; color: white;
        background: linear-gradient(45deg, #ff416c, #ff4b2b); width: 100%; transition: 0.3s;
    }

    .game-card:hover .play-btn {
        box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4);
    }

    .back-btn {
        margin-top: 40px; padding: 10px 20px; background: transparent; border: 2px solid #d81b60;
        color: #d81b60; border-radius: 50px; font-family: 'Poppins', sans-serif; font-weight: 600;
        cursor: pointer; transition: 0.3s;
    }
    
    .back-btn:hover { background: #d81b60; color: white; }
</style>
</head>
<body>

    <h1>Oyun Odamız</h1>
    <p class="subtitle">Birlikte eğlenmek için bir macera seç 💖</p>

    <div class="game-container">
        
        <a href="hafiza.html" class="game-card">
            <div class="game-icon">🧩</div>
            <h3>Anı Eşleştirme</h3>
            <p>En güzel fotoğraflarımızı hafızanda tutabilir misin?</p>
            <button class="play-btn">Oyna</button>
        </a>

        <a href="masal.html" class="game-card">
            <div class="game-icon">📖</div>
            <h3>Turluk Masalı</h3>
            <p>Kendi seçimlerinle hikayemizin gidişatını sen belirle.</p>
            <button class="play-btn">Oku & Seç</button>
        </a>

        <a href="kosu.html" class="game-card">
            <div class="game-icon">🏃‍♂️</div>
            <h3>Sonsuz Aşk Koşusu</h3>
            <p>Engelleri aş ve bana ulaşmak için kalpleri topla!</p>
            <button class="play-btn">Başla</button>
        </a>

    </div>

    <button class="back-btn" onclick="window.location.href='./index.html'">Geri Dön</button>

</body>
</html>
