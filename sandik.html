<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kilitli Not Sandığı 🔒</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink:      #0A1628;
            --deep:     #112240;
            --azure:    #2D6FBD;
            --sky:      #6BB8E8;
            --mist:     #C8E8F8;
            --parchment:#EBF5FD;
            --ember:    #FF6B8A;
            --honey:    #F5C957;
            --frost:    rgba(255,255,255,0.06);
            --rim:      rgba(255,255,255,0.13);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif; background: var(--ink); color: var(--parchment);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow-x: hidden; padding: 20px; position: relative;
        }

        #bg-stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        /* ── Şifre Giriş Ekranı (Lockscreen) ── */
        .lock-screen {
            position: relative; z-index: 20; background: var(--frost); border: 1px solid var(--rim);
            padding: 40px 30px; border-radius: 24px; text-align: center; width: 100%; max-width: 360px;
            backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            transition: all 0.5s ease;
        }
        .lock-icon { font-size: 50px; margin-bottom: 15px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        
        .lock-screen h2 { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-style: italic; color: var(--honey); margin-bottom: 20px; }
        .pin-input {
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2); color: #fff; text-align: center; font-size: 16px; letter-spacing: 2px;
            margin-bottom: 15px; outline: none; font-family: 'Poppins', sans-serif;
        }
        .pin-input:focus { border-color: var(--sky); }
        .unlock-btn {
            width: 100%; padding: 12px; border: none; border-radius: 50px; font-weight: 600;
            background: linear-gradient(135deg, var(--azure), var(--sky)); color: #fff; cursor: pointer; transition: 0.2s;
        }
        .unlock-btn:hover { transform: translateY(-1px); }

        /* ── Ana Sandık Arayüzü ── */
        .chest-container {
            display: none; position: relative; z-index: 10; width: 100%; max-width: 480px;
            background: var(--frost); border: 1px solid var(--rim); border-radius: 24px;
            padding: 25px; backdrop-filter: blur(20px); box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .chest-header { text-align: center; margin-bottom: 25px; }
        .chest-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-style: italic; color: var(--honey); }
        .chest-header p { font-size: 12px; color: var(--mist); opacity: 0.7; }

        /* Not Ekleme Formu */
        .note-form { background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 16px; margin-bottom: 25px; }
        .author-select { display: flex; gap: 10px; margin-bottom: 12px; }
        .author-label {
            flex: 1; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; font-size: 13px; cursor: pointer; background: rgba(255,255,255,0.02); transition: 0.2s;
        }
        .author-select input[type="radio"] { display: none; }
        
        /* Aktif Yazar Renkleri */
        #authorSara:checked + .author-label { background: rgba(255,107,138,0.2); border-color: var(--ember); color: var(--ember); font-weight: 600; }
        #authorErtugrul:checked + .author-label { background: rgba(107,184,232,0.2); border-color: var(--sky); color: var(--sky); font-weight: 600; }

        .note-textarea {
            width: 100%; height: 90px; padding: 12px; border-radius: 10px;
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.08);
            color: #fff; font-family: 'Poppins', sans-serif; font-size: 13px;
            resize: none; outline: none; margin-bottom: 12px;
        }
        .note-textarea::placeholder { color: rgba(255,255,255,0.3); }
        .save-btn {
            width: 100%; padding: 12px; border: none; border-radius: 50px; font-weight: 600;
            background: linear-gradient(135deg, var(--ember), var(--honey)); color: #fff;
            cursor: pointer; font-size: 13px; box-shadow: 0 5px 15px rgba(255,107,138,0.25);
        }

        /* Notların Listelendiği Alan */
        .notes-list { max-height: 320px; overflow-y: auto; padding-right: 5px; }
        .notes-list::-webkit-scrollbar { width: 5px; }
        .notes-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .note-card {
            padding: 15px; border-radius: 14px; margin-bottom: 12px; position: relative;
            background: rgba(255,255,255,0.02); border-left: 4px solid #fff;
            animation: slideIn 0.3s ease-out forwards;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .note-card.sara { border-left-color: var(--ember); background: rgba(255,107,138,0.03); }
        .note-card.ertugrul { border-left-color: var(--sky); background: rgba(107,184,232,0.03); }

        .note-meta { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; opacity: 0.6; }
        .note-author { font-weight: 600; }
        .note-author.sara-name { color: var(--ember); }
        .note-author.ertugrul-name { color: var(--sky); }
        
        .note-text { font-size: 13px; line-height: 1.5; word-wrap: break-word; white-space: pre-line; }
        
        .delete-note {
            position: absolute; top: 12px; right: 12px; background: transparent;
            border: none; color: var(--ember); cursor: pointer; opacity: 0; font-size: 12px; transition: 0.2s;
        }
        .note-card:hover .delete-note { opacity: 0.7; }
        .note-card:hover .delete-note:hover { opacity: 1; }

        .empty-state { text-align: center; color: rgba(255,255,255,0.2); font-size: 13px; padding: 30px 0; }

        .back-btn { display: block; text-align: center; color: var(--mist); text-decoration: none; font-size: 12px; margin-top: 20px; opacity: 0.7; }
        .back-btn:hover { opacity: 1; }
    </style>
</head>
<body>

<canvas id="bg-stars"></canvas>

<!-- 🔒 KİLİT EKRANI -->
<div class="lock-screen" id="lockScreen">
    <div class="lock-icon">🔒</div>
    <h2>Not Sandığı Kilitli</h2>
    <input type="password" class="pin-input" id="pinInput" placeholder="Şifreyi Gir sevgilim..." onkeydown="if(event.key==='Enter') unlock()">
    <button class="unlock-btn" onclick="unlock()">Sandığı Aç 🔓</button>
</div>

<!-- 🔓 ANILAR/NOTLAR SANDIĞI -->
<div class="chest-container" id="chestContainer">
    <div class="chest-header">
        <h1>Aşk Sandığımız 🧰</h1>
        <p>Birbirimize saklı kalacak küçük, tatlı notlar...</p>
    </div>

    <!-- Not Yazma Paneli -->
    <div class="note-form">
        <div class="author-select">
            <input type="radio" name="author" id="authorSara" value="Sara" checked>
            <label class="author-label" for="authorSara">🌸 Sara</label>
            
            <input type="radio" name="author" id="authorErtugrul" value="Ertuğrul">
            <label class="author-label" for="authorErtugrul">😎 Ertuğrul</label>
        </div>
        <textarea class="note-textarea" id="noteTextarea" placeholder="İçinden geçenleri buraya dök, sandığa kilitleyelim... 📝"></textarea>
        <button class="save-btn" onclick="addNote()">Notu Sandığa At ✨</button>
    </div>

    <!-- Notların Döküldüğü Liste -->
    <div class="notes-list" id="notesList">
        <!-- JS ile dolacak -->
    </div>

    <a href="index.html" class="back-btn">⬅️ Ana Sayfaya Dön</a>
</div>

<script>
/* ── Güvenlik / Giriş Kontrolü ── */
(function(){
  const ts = localStorage.getItem('sara_giris');
  const EIGHT_HOURS = 8 * 60 * 60 * 1000;
  if((!ts || (Date.now() - parseInt(ts)) > EIGHT_HOURS) && !location.search.includes('dev')){
    location.replace('giris.html');
  }
})();

/* ── Arka Plan Yıldızları ── */
(function () {
    const cv = document.getElementById('bg-stars'); const ctx = cv.getContext('2d');
    let W, H, stars = [];
    function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
    function mkStar() { return { x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.1 + .2, a: Math.random(), da: (Math.random() * .003 + .001) * (Math.random() < .5 ? 1 : -1) }; }
    function init() { resize(); stars = Array.from({ length: 50 }, mkStar); }
    function draw() {
        ctx.clearRect(0, 0, W, H);
        stars.forEach(s => {
            s.a = Math.max(.05, Math.min(.95, s.a + s.da)); if (s.a <= .05 || s.a >= .95) s.da *= -1;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fillStyle = `rgba(255,255,255,${s.a})`; ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    addEventListener('resize', () => { resize(); stars = Array.from({ length: 50 }, mkStar); });
    init(); draw();
})();

/* ── Kilit Açma Mantığı ── */
const CORRECT_PASSWORD = "sara"; // Değiştirmek istersen burayı düzenleyebilirsin kanka

function unlock() {
    const input = document.getElementById('pinInput').value;
    if (input.toLowerCase() === CORRECT_PASSWORD) {
        document.getElementById('lockScreen').style.display = 'none';
        const chest = document.getElementById('chestContainer');
        chest.style.display = 'block';
        renderNotes();
    } else {
        alert("Hatalı şifre! Tekrar dene sevgilim... ❌");
        document.getElementById('pinInput').value = '';
    }
}

/* ── Not Defteri Mantığı (Cache/LocalStorage) ── */
let notes = JSON.parse(localStorage.getItem('sandik_notlari')) || [];

function renderNotes() {
    const list = document.getElementById('notesList');
    list.innerHTML = '';

    if (notes.length === 0) {
        list.innerHTML = `<div class="empty-state">Sandık henüz boş... <br>İlk aşk notunu yukarıdan bırakabilirsin! 📜</div>`;
        return;
    }

    // En yeni notu en üstte göstermek için ters çeviriyoruz
    [...notes].reverse().forEach((note, index) => {
        const actualIndex = notes.length - 1 - index; // Silme işlemi için gerçek index
        const isSara = note.author === 'Sara';
        const card = document.createElement('div');
        card.className = `note-card ${isSara ? 'sara' : 'ertugrul'}`;
        
        card.innerHTML = `
            <div class="note-meta">
                <span class="note-author ${isSara ? 'sara-name' : 'ertugrul-name'}">${isSara ? '🌸 Sara' : '😎 Ertuğrul'}</span>
                <span>${note.date}</span>
            </div>
            <div class="note-text">${escapeHTML(note.text)}</div>
            <button class="delete-note" onclick="deleteNote(${actualIndex})">✖ Sil</button>
        `;
        list.appendChild(card);
    });
}

function addNote() {
    const textarea = document.getElementById('noteTextarea');
    const text = textarea.value.trim();
    if (!text) return;

    const author = document.querySelector('input[name="author"]:checked').value;
    
    // Tarih formatlama
    const now = new Date();
    const dateStr = `${now.getDate().toString().padStart(2,'0')}.${(now.getMonth()+1).toString().padStart(2,'0')}.${now.getFullYear()} - ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

    const newNote = { author, text, date: dateStr };
    notes.push(newNote);
    
    // Cache'e kaydet
    localStorage.setItem('sandik_notlari', JSON.stringify(notes));
    
    // Temizle ve yeniden yükle
    textarea.value = '';
    renderNotes();
}

function deleteNote(index) {
    if(confirm("Bu notu sandıktan kalıcı olarak silmek istiyor musun?")) {
        notes.splice(index, 1);
        localStorage.setItem('sandik_notlari', JSON.stringify(notes));
        renderNotes();
    }
}

// XSS koruması için düz metne çevirme fonksiyonu
function escapeHTML(str) {
    return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
}
</script>

<!-- 💖 MOUSE EFEKTİ STİLLERİ 💖 -->
<style>
    /* 1. Fare İmlecini Kalp Yapma */
    body {
        /* İmleci pembe bir kalp SVG'si ile değiştirir (12 12 imlecin merkez noktasıdır) */
        cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path fill='%23FF6B8A' d='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'/></svg>") 12 12, auto;
    }

    /* Butonlar ve linkler üzerine gelindiğinde de imleç kalp kalsın ama parlasın */
    a, button, .flipper, canvas, input, textarea {
        cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path fill='%23F5C957' d='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'/></svg>") 12 12, pointer !important;
    }

    /* 2. Uçuşan Kalplerin Tasarımı */
    .magic-heart {
        position: fixed;
        pointer-events: none; /* Kalplerin tıklamayı engellememesi için çok önemli */
        z-index: 9999;
        font-size: 16px;
        animation: floatAndFade 1s ease-out forwards;
        transform: translate(-50%, -50%); /* Tam farenin ucundan çıkması için */
    }

    /* Kalplerin yukarı doğru uçup kaybolma animasyonu */
    @keyframes floatAndFade {
        0% { 
            transform: translate(-50%, -50%) scale(0.5); 
            opacity: 1; 
        }
        100% { 
            transform: translate(-50%, -150px) scale(1.5); 
            opacity: 0; 
        }
    }
</style>

<!-- 💖 MOUSE EFEKTİ JAVASCRIPT'İ 💖 -->
<script>
(function() {
    // Ekranda çıkacak kalp çeşitleri (istediğin emojiyi ekleyebilirsin)
    const hearts = ["💖", "✨", "💕", "🌸", "💘"];
    
    // Farenin her hareketini dinle
    document.addEventListener('mousemove', function(e) {
        // Çok fazla kalp çıkıp ekranı dondurmasın diye %80 ihtimalle boş geçiyoruz
        if (Math.random() > 0.15) return;

        // Yeni bir kalp elementi oluştur
        const heartEl = document.createElement('div');
        heartEl.className = 'magic-heart';
        
        // Rastgele bir kalp emojisi seç
        heartEl.innerText = hearts[Math.floor(Math.random() * hearts.length)];
        
        // Kalbin çıkacağı konumu farenin konumuna ayarla
        heartEl.style.left = e.clientX + 'px';
        heartEl.style.top = e.clientY + 'px';
        
        // Biraz rastgelelik katalım (hafif sağa veya sola doğru uçsunlar)
        const randomX = (Math.random() - 0.5) * 50; 
        heartEl.style.setProperty('--tx', `${randomX}px`);

        // Elementi sayfaya ekle
        document.body.appendChild(heartEl);
        
        // Animasyon bitince (1 saniye sonra) elementi DOM'dan sil (kasmasını engeller)
        setTimeout(() => {
            heartEl.remove();
        }, 1000);
    });
})();
</script>

</body>
</html>
