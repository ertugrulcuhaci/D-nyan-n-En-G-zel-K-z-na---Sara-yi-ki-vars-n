<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Emine Sara'm ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; font-family: 'Poppins', sans-serif; text-align: center;
            /* Mavi Gradient: Derin lacivertten turkuaza */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; overflow: hidden;
            color: white;
        }

        /* Cam Efekti (Glassmorphism) */
        .content {
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 90%; width: 500px;
            z-index: 10;
        }

        h1 { font-family: 'Great Vibes', cursive; font-size: 55px; color: #81d4fa; margin: 0 0 20px 0; text-shadow: 0 0 10px rgba(129, 212, 250, 0.5); }
        
        .timer-boxes { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .time-box { background: rgba(0, 188, 212, 0.2); padding: 15px; border-radius: 15px; min-width: 60px; border: 1px solid rgba(255,255,255,0.1); }
        .time-num { font-size: 24px; font-weight: 600; color: #ffffff; display: block; }
        .time-label { font-size: 10px; color: #b3e5fc; text-transform: uppercase; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .play-btn {
            padding: 15px 30px; font-size: 18px; border: none; border-radius: 50px; 
            cursor: pointer; color: white; width: 100%; transition: 0.4s;
            background: rgba(255, 255, 255, 0.1); border: 1px solid #81d4fa;
        }
        .play-btn:hover { background: #0288d1; transform: scale(1.05); }

        /* Yıldız Efekti */
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="stars"></div>

    <div class="content">
        <h1>Emine Sara Gözükara</h1>
        
        <div class="timer-boxes">
            <div class="time-box"><span class="time-num" id="d">00</span><span class="time-label">Gün</span></div>
            <div class="time-box"><span class="time-num" id="h">00</span><span class="time-label">Saat</span></div>
            <div class="time-box"><span class="time-num" id="m">00</span><span class="time-label">Dk</span></div>
            <div class="time-box"><span class="time-num" id="s">00</span><span class="time-label">Sn</span></div>
        </div>

        <div class="btn-group">
            <button class="play-btn" onclick="window.location.href='oyun.html'">🎮 Oyun Oynayalım</button>
            <button class="play-btn" onclick="window.location.href='soru.html'">🥺 Sana Bir Sorum Var</button>
        </div>
    </div>

<script>
    // Yıldız yağmuru efekti
    const starsContainer = document.getElementById('stars');
    for(let i=0; i<50; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.width = Math.random()*3 + 'px';
        star.style.height = star.style.width;
        star.style.left = Math.random()*100 + 'vw';
        star.style.top = Math.random()*100 + 'vh';
        star.style.animationDelay = Math.random()*3 + 's';
        starsContainer.appendChild(star);
    }

    const startDate = new Date("2026-04-28T00:00:00"); 
    function updateTimer() {
        const now = new Date();
        const diff = now - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / 1000 / 60) % 60);
        const seconds = Math.floor((diff / 1000) % 60);
        document.getElementById("d").innerText = days.toString().padStart(2, '0');
        document.getElementById("h").innerText = hours.toString().padStart(2, '0');
        document.getElementById("m").innerText = minutes.toString().padStart(2, '0');
        document.getElementById("s").innerText = seconds.toString().padStart(2, '0');
    }
    setInterval(updateTimer, 1000); updateTimer();
</script>
</body>
</html>
