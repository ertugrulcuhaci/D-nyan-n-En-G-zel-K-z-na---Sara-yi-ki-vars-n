<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emine Sara'm ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    /* GENEL STİLLER */
    body {
        margin: 0; font-family: 'Poppins', sans-serif; text-align: center;
        background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%), linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
        background-blend-mode: soft-light; color: #333; overflow: hidden;
        height: 100vh; display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        cursor: url('https://img.icons8.com/emoji/32/cat-face.png'), auto !important;
    }

    /* FOTO KOLAJ */
    .bg {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; justify-content: center; align-items: center;
        flex-wrap: wrap; gap: 15px; filter: blur(4px) saturate(1.2);
        z-index: -1; opacity: 0.35;
    }
    .bg img {
        width: 28%; height: 28%; object-fit: cover; border-radius: 20px;
        animation: floatImg 6s ease-in-out infinite alternate;
    }

    @keyframes floatImg { from { transform: translateY(0); } to { transform: translateY(-10px); } }

    /* İÇERİK KUTUSU */
    .content {
        background: rgba(255, 255, 255, 0.45); padding: 40px 45px;
        border-radius: 35px; backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: 0 30px 60px rgba(216, 27, 96, 0.15);
        z-index: 10; animation: fadeIn 1.8s ease-out;
        max-width: 90%; width: 500px;
    }

    h1 {
        font-family: 'Great Vibes', cursive; font-size: clamp(45px, 10vw, 65px);
        margin: 0 0 10px 0; color: #d81b60;
        text-shadow: 0 0 15px rgba(216, 27, 96, 0.1); line-height: 1.2;
    }
    .signature { font-size: 16px; margin: 5px 0 25px 0; color: #7d3c4a; }

    /* SAYAÇ */
    .counter-title { font-size: 13px; text-transform: uppercase; letter-spacing: 2px; color: #b8144c; font-weight: 600; margin-bottom: 15px; }
    .timer-boxes { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
    .time-box {
        background: rgba(255, 255, 255, 0.7); padding: 10px 12px;
        border-radius: 15px; min-width: 65px; border: 1px solid rgba(216, 27, 96, 0.15);
    }
    .time-num { font-size: 22px; font-weight: 600; color: #d81b60; display: block; }
    .time-label { font-size: 10px; color: #777; text-transform: uppercase; font-weight: 600; }

    /* BUTON GRUBU */
    .btn-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
    
    .play-btn {
        padding: 15px 30px; font-size: 18px; font-family: 'Poppins', sans-serif;
        font-weight: 600; border: none; border-radius: 50px; cursor: pointer;
        color: white; transition: all 0.4s ease;
        display: inline-flex; align-items: center; gap: 8px;
    }
    
    .btn-game { background: linear-gradient(45deg, #ff416c, #ff4b2b); box-shadow: 0 10px 30px rgba(255, 75, 43, 0.35); }
    .btn-question { background: linear-gradient(45deg, #8E2DE2, #4A00E0); box-shadow: 0 10px 30px rgba(74, 0, 224, 0.35); }
    
    .play-btn:hover { transform: scale(1.05); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }

    /* PARILTI VE KALPLER */
    .sparkle { position: absolute; pointer-events: none; background: white; border-radius: 50%; animation: sparkleAnim 1s linear forwards; z-index: 100; }
    @keyframes sparkleAnim { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.2); opacity: 0; } }
    .floating-heart {
        position: absolute; bottom: -20px; color: rgba(216, 27, 96, 0.2); font-size: 20px; pointer-events: none; animation: floatUp 8s linear infinite; z-index: 1;
    }
    @keyframes floatUp { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.6; } 100% { transform: translateY(-105vh) rotate(360deg); opacity: 0; } }
</style>
</head>

<body>
<audio id="bgMusic" loop preload="auto"><source src="sarki.mp3" type="audio/mpeg"></audio>

<div class="bg">
    <img src="resim1.jpg"> <img src="resim2.png"> <img src="resim3.jpg">
    <img src="resim4.png"> <img src="resim5.jpg">
</div>

<div class="content">
    <h1>Emine Sara Gözükara</h1>
    <div class="signature">– Ertuğrul Çuhacı</div>
    
    <div class="counter-title">Sonsuzluğa Giden Yolculuğumuz</div>
    
    <div class="timer-boxes">
        <div class="time-box"><span class="time-num" id="d">00</span><span class="time-label">Gün</span></div>
        <div class="time-box"><span class="time-num" id="h">00</span><span class="time-label">Saat</span></div>
        <div class="time-box"><span class="time-num" id="m">00</span><span class="time-label">Dk</span></div>
        <div class="time-box"><span class="time-num" id="s">00</span><span class="time-label">Sn</span></div>
    </div>

    <div class="btn-group">
        <button class="play-btn btn-game" onclick="goToGame()">🎮 Oyun Oynayalım</button>
        <button class="play-btn btn-question" onclick="goToQuestion()">🥺 Sana Bir Sorum Var</button>
    </div>
</div>

<script>
// TARIH GÜNCELLENDİ (28 Nisan 2026)
const startDate = new Date("2026-04-28T00:00:00"); 

function updateTimer() {
    const now = new Date();
    const diff = now - startDate;
    if (diff < 0) return;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / 1000 / 60) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("d").innerText = days < 10 ? "0" + days : days;
    document.getElementById("h").innerText = hours < 10 ? "0" + hours : hours;
    document.getElementById("m").innerText = minutes < 10 ? "0" + minutes : minutes;
    document.getElementById("s").innerText = seconds < 10 ? "0" + seconds : seconds;
}
setInterval(updateTimer, 1000); updateTimer();

window.addEventListener('click', () => { document.getElementById("bgMusic").play().catch(() => {}); }, { once: true });

function goToGame() {
    document.body.style.opacity = "0"; document.body.style.transition = "0.5s";
    setTimeout(() => { window.location.href = './oyun.html'; }, 500);
}

function goToQuestion() {
    document.body.style.opacity = "0"; document.body.style.transition = "0.5s";
    setTimeout(() => { window.location.href = './soru.html'; }, 500);
}

document.addEventListener('mousemove', (e) => { if (Math.random() > 0.85) createSparkle(e.pageX, e.pageY); });
function createSparkle(x, y) {
    const s = document.createElement('div'); s.className = 'sparkle';
    const size = Math.random() * 5 + 2 + 'px'; s.style.width = size; s.style.height = size;
    s.style.left = x + 'px'; s.style.top = y + 'px'; document.body.appendChild(s);
    setTimeout(() => s.remove(), 1000);
}

function createFloatingHeart() {
    const heart = document.createElement('div'); heart.className = 'floating-heart'; heart.innerHTML = '❤️';
    heart.style.left = Math.random() * 100 + 'vw'; heart.style.animationDuration = Math.random() * 4 + 6 + 's';
    heart.style.fontSize = Math.random() * 15 + 12 + 'px'; document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 10000);
}
setInterval(createFloatingHeart, 400);
</script>
</body>
</html>
