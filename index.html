<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Emine Sara'm ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --blue-dark: #0f2027; --blue-mid: #203a43; --blue-light: #2c5364; }
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid), var(--blue-light));
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            height: 100vh; display: flex; justify-content: center; align-items: center; color: white;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .card { background: rgba(255, 255, 255, 0.05); padding: 50px; border-radius: 40px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 85%; max-width: 500px;
        }
        h1 { font-family: 'Great Vibes', cursive; font-size: 3.5rem; color: #b3e5fc; margin-bottom: 20px; text-shadow: 0 0 20px rgba(179, 229, 252, 0.3); }
        .timer { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .time-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; width: 60px; border: 1px solid rgba(255,255,255,0.1); }
        .num { font-size: 1.5rem; font-weight: 600; display: block; }
        .lbl { font-size: 0.7rem; color: #81d4fa; text-transform: uppercase; }

        .btn { display: block; width: 100%; padding: 18px; margin-bottom: 15px; border: none; border-radius: 50px;
            background: rgba(255,255,255,0.08); color: white; cursor: pointer; transition: 0.4s; font-size: 1.1rem;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px);
        }
        .btn:hover { background: rgba(129, 212, 250, 0.2); box-shadow: 0 0 20px rgba(129, 212, 250, 0.3); transform: translateY(-5px); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Emine Sara</h1>
        <div class="timer" id="timer"></div>
        <button class="btn" onclick="window.location.href='oyun.html'">🎮 Anılarımızdan Oyun</button>
        <button class="btn" onclick="window.location.href='soru.html'">💩 Sana Bir Sorum Var</button>
    </div>
    <script>
        // Sayaç kodu (aynı)
        const start = new Date("2026-04-28T00:00:00");
        setInterval(() => {
            const diff = new Date() - start;
            document.getElementById("timer").innerHTML = `
                <div class="time-box"><span class="num">${Math.floor(diff/86400000)}</span><span class="lbl">Gün</span></div>
                <div class="time-box"><span class="num">${Math.floor((diff/3600000)%24)}</span><span class="lbl">Saat</span></div>
                <div class="time-box"><span class="num">${Math.floor((diff/60000)%60)}</span><span class="lbl">Dk</span></div>
            `;
        }, 1000);
    </script>
</body>
</html>
