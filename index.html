<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emine Sara'm ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --night-deep: #0B1D3A;
            --night-mid: #163A66;
            --blue-primary: #2C6FBD;
            --blue-light: #8ECDF0;
            --blue-pale: #EAF4FC;
            --rose: #FF6F91;
            --gold: #F4C95D;
            --glass: rgba(255,255,255,0.07);
            --glass-border: rgba(255,255,255,0.18);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: 'Poppins', sans-serif; text-align: center;
            background: radial-gradient(ellipse at top, var(--night-mid), var(--night-deep) 70%);
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; overflow: hidden;
            position: relative; color: var(--blue-pale);
        }

        /* Yıldızlı gece efekti */
        #stars { position: fixed; inset: 0; z-index: -2; pointer-events: none; }
        .star {
            position: absolute; background: #fff; border-radius: 50%;
            opacity: 0.2; animation: twinkle 3s ease-in-out infinite;
        }
        @keyframes twinkle { 0%, 100% { opacity: .15; } 50% { opacity: .9; } }

        .shooting-star {
            position: fixed; top: 12%; left: -10%; width: 2px; height: 2px;
            background: white; border-radius: 50%;
            box-shadow: 0 0 6px 2px rgba(255,255,255,0.8);
            animation: shoot 7s linear infinite; animation-delay: 3s;
            z-index: -1; opacity: 0;
        }
        @keyframes shoot {
            0% { transform: translate(0,0); opacity: 0; }
            4% { opacity: 1; }
            22% { transform: translate(70vw, 35vh); opacity: 0; }
            100% { opacity: 0; }
        }

        /* Arka Plan Resimleri */
        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            flex-wrap: wrap; gap: 15px;
            filter: blur(6px) brightness(0.55) saturate(1.3) hue-rotate(190deg);
            z-index: -3; opacity: 0.35;
        }
        .bg img { width: 300px; height: 200px; object-fit: cover; border-radius: 20px; }

        /* İçerik */
        .content {
            background: var(--glass); padding: 40px;
            border-radius: 35px; backdrop-filter: blur(18px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 40px rgba(44,111,189,0.18);
            max-width: 90%; width: 500px; z-index: 10;
            animation: riseIn 1s ease;
        }
        @keyframes riseIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 {
            font-family: 'Great Vibes', cursive; font-size: clamp(34px, 9vw, 52px);
            margin: 0 0 6px 0;
            background: linear-gradient(90deg, var(--gold), var(--blue-light));
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .subtitle {
            font-size: 13px; letter-spacing: 0.4px;
            color: rgba(234,244,252,0.65); margin: 0 0 26px 0;
        }

        /* Sayaç */
        .timer-boxes { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .time-box {
            background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border);
            padding: 10px; border-radius: 15px; min-width: 60px;
        }
        .time-num {
            font-size: 20px; font-weight: 600; color: var(--blue-light);
            display: block; text-shadow: 0 0 12px rgba(142,205,240,0.5);
        }
        .time-label { font-size: 10px; color: rgba(234,244,252,0.55); text-transform: uppercase; letter-spacing: 1px; }

        /* Butonlar */
        .btn-group { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .play-btn {
            padding: 15px 30px; font-size: 17px; font-weight: 600; font-family: 'Poppins', sans-serif;
            border: none; border-radius: 50px; cursor: pointer; color: white; width: 100%;
            transition: 0.3s;
        }
        .btn-game {
            background: linear-gradient(45deg, var(--blue-primary), var(--blue-light));
            box-shadow: 0 8px 20px rgba(44,111,189,0.4);
        }
        .btn-question {
            background: linear-gradient(45deg, var(--rose), var(--gold));
            box-shadow: 0 8px 20px rgba(255,111,145,0.35);
        }
        .play-btn:hover { transform: scale(1.05) translateY(-2px); }
        @media (prefers-reduced-motion: reduce) {
            .star, .shooting-star, .content { animation: none; }
        }
    </style>
</head>

<body>

    <div id="stars"></div>
    <div class="shooting-star"></div>

    <div class="bg">
        <img src="masal1.jpg"> <img src="masal2.jpg"> <img src="masal3.jpg">
        <img src="masal4.jpg"> <img src="masal5.jpg">
    </div>

    <div class="content">
        <h1>Emine Sara Gözükara</h1>
        <p class="subtitle">Seninle geçen her an, gökyüzündeki en parlak yıldız ✨</p>

        <div class="timer-boxes">
            <div class="time-box"><span class="time-num" id="d">00</span><span class="time-label">Gün</span></div>
            <div class="time-box"><span class="time-num" id="h">00</span><span class="time-label">Saat</span></div>
            <div class="time-box"><span class="time-num" id="m">00</span><span class="time-label">Dk</span></div>
            <div class="time-box"><span class="time-num" id="s">00</span><span class="time-label">Sn</span></div>
        </div>

        <div class="btn-group">
            <button class="play-btn btn-game" onclick="window.location.href='oyun.html'">🎮 Oyun Oynayalım</button>
            <button class="play-btn btn-question" onclick="window.location.href='soru.html'">🥺 Sana Bir Sorum Var</button>
        </div>
    </div>

<script>
    // Yıldız alanı
    (function(){
        const starsEl = document.getElementById('stars');
        for (let i = 0; i < 45; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 2 + 1;
            s.style.width = size + 'px';
            s.style.height = size + 'px';
            s.style.top = Math.random() * 100 + '%';
            s.style.left = Math.random() * 100 + '%';
            s.style.animationDelay = (Math.random() * 3) + 's';
            s.style.animationDuration = (2 + Math.random() * 3) + 's';
            starsEl.appendChild(s);
        }
    })();

    // Sayaç
    const startDate = new Date("2026-04-28T00:00:00");

    function updateTimer() {
        const now = new Date();
        const diff = now - startDate;
        if (diff < 0) return;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / 1000 / 60) % 60);
        const seconds = Math.floor((diff / 1000) % 60);
        document.getElementById("d").innerText = days.toString().padStart(2, '0');
        document.getElementById("h").innerText = hours.toString().padStart(2, '0');
        document.getElementById("m").innerText = minutes.toString().padStart(2, '0');
        document.getElementById("s").innerText = seconds.toString().padStart(2, '0');
    }
    setInterval(updateTimer, 1000);
    updateTimer();
</script>
</body>
</html>
